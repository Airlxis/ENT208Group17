<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>本地 LLM 聊天</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --brand-deep: #3f448f;
      --brand-deeper: #34387f;
      --brand-mid: #5f4fc8;
      --brand-mid-2: #6a58d4;
      --brand-mid-3: #5647bc;
      --bg-1: #f7f4ff;
      --bg-2: #ede8ff;
      --bg-3: #e0daf8;
      --card: #ffffff;
      --line: #dfe3f1;
      --text: #242545;
      --muted: #726f99;
      --soft: #f6f8fd;
      --soft-2: #f1f4fc;
      --active: #e9eefc;
      --sidebar-bg: #ffffff;
      --sidebar-border: #e5e8f4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 520px at 12% 8%, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0) 56%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 32px 0;
      padding-left: 0;
      padding-right: 0;
      transition: padding-left 0.2s ease, padding-right 0.2s ease;
    }

    /* 桌面端：侧边栏收起时给左侧按钮预留空白边 */
    @media (min-width: 901px) {
      body {
        padding-left: 46px;
      }
      body.sidebar-open {
        padding-left: 324px;
      }
    }

    body.sidebar-open {
      padding-left: 320px;
    }

    .app {
      width: 100%;
      max-width: 1400px; /* 让对话白框更贴近两侧边栏 */
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);
      padding: 0 14px; /* 减少左右留白 */
    }

    .header {
      padding: 8px 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--card);
      cursor: pointer;
      display: none; /* 桌面端不显示，通过侧边栏右上角按钮控制展开/收起 */
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, border-color 0.15s ease;
      flex: 0 0 auto;
    }

    .menu-btn:hover {
      background: var(--soft);
      border-color: #cfc4f0;
    }

    .hamburger {
      width: 16px;
      height: 12px;
      position: relative;
    }

    .hamburger span {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
    }

    .hamburger span:nth-child(1) { top: 0; }
    .hamburger span:nth-child(2) { top: 5px; }
    .hamburger span:nth-child(3) { top: 10px; }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    .chat-container {
      flex: 1;
      margin-top: 8px;
      padding: 12px;
      border-radius: 16px;
      background: var(--card);
      box-shadow: 0 10px 15px -10px rgba(15, 23, 42, 0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* 空白态（ChatGPT 风格）：问候语 + 短输入框居中展示 */
    .chat-container.chat-empty {
      justify-content: center;
      padding: 26px 18px 22px;
    }

    .chat-container.chat-empty .messages {
      display: none;
    }

    .chat-container.chat-empty .empty-prompt {
      position: static;
      display: flex;
      bottom: auto;
      pointer-events: none;
      padding: 0 0 14px;
    }

    .chat-container.chat-empty .input-area {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
      justify-content: center;
    }

    .chat-container.chat-empty .input-area textarea {
      flex: 0 1 auto;
      width: min(560px, 92%); /* 约缩短到原来的 2/3 */
      min-width: 260px;
    }

    .empty-prompt {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 80px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      padding: 24px 16px;
      gap: 10px;
      pointer-events: none; /* 防止遮挡输入区域交互 */
    }

    .empty-prompt-title {
      font-size: 20px;
      color: var(--text);
      font-weight: 650;
    }

    .empty-prompt-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      margin-bottom: 8px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-body {
      max-width: 100%;
      display: flex;
      flex-direction: column;
    }

    .message-row.user .message-body {
      align-items: flex-end;
    }

    .message-row.assistant .message-body {
      align-items: flex-start;
    }

    .assistant-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .assistant-mini-btn {
      height: 26px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      width: 28px;
      padding: 0;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      user-select: none;
    }

    .assistant-mini-btn svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .assistant-mini-btn.copied {
      color: #16a34a;
      border-color: #86efac;
      background: #f0fdf4;
    }

    .assistant-mini-btn:hover {
      background: var(--soft);
      border-color: #c8bceb;
    }

    .assistant-mini-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message-bubble {
      /* 让气泡“内容宽度自适应”，只在超过最大宽度时才自动换行 */
      display: inline-block;
      max-width: 560px;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      /* 英文换行：不在单词中间强行拆开（需要完整词语/空格才能换行） */
      word-break: normal;
      overflow-wrap: normal;
    }

    .message-row.user .message-bubble {
      background: linear-gradient(135deg, #7c6ae0, #6a58d4);
      color: #ffffff;
      border-bottom-right-radius: 4px;
      /* 用户消息不需要保留换行语义，避免短文本在窄宽度下被拆成多行/竖排 */
      white-space: normal;
    }

    .message-row.assistant .message-bubble {
      background: #f3f4f6;
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message-bubble a {
      color: #335fc7;
      text-decoration: underline !important;
      text-underline-offset: 2px;
      cursor: pointer;
      word-break: break-all;
    }

    .message-bubble a:hover {
      color: #274da7;
    }

    @media (max-width: 900px) {
      .message-bubble {
        max-width: 100%;
      }
    }

    .input-area {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      min-width: 0;
      max-width: 580px; /* 约缩短到原来的 2/3 */
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    /* 左右边栏都展开时：中间区域更窄，输入框也跟随收一点 */
    body.sidebar-open.right-expanded .input-area {
      max-width: 520px;
    }

    textarea {
      flex: 1 0 auto;
      min-width: 200px;
      resize: none;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 8px 12px;
      font-size: 14px;
      line-height: 1.4;
      outline: none;
      max-height: 110px;
      min-height: 40px;
      /* 禁用自动换行：短输入时避免“两个字就换行”（保持单行，宽度不够就横向滚动） */
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
      overflow-x: auto;
    }

    #send {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      padding: 0;
      border-radius: 50%;
      background: var(--brand-mid);
      color: #ffffff;
      border: 1px solid transparent;
    }

    #send svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    #send:not(:disabled):hover {
      background: var(--brand-mid-3);
    }

    #send:disabled {
      background: #9ca3af;
      border-color: #9ca3af;
    }

    textarea:focus {
      border-color: var(--brand-mid);
      box-shadow: 0 0 0 1px rgba(95, 79, 200, 0.22);
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 0 18px;
      height: 38px;
      background: var(--brand-mid-2);
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    button:not(:disabled):hover {
      background: var(--brand-mid-3);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      margin-left: 4px;
    }

    @media (max-width: 640px) {
      .app {
        padding: 0 8px;
      }

      .chat-container {
        padding: 10px;
      }
    }

    /* Right Sidebar (new): 模块服务 */
    .right-sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      height: 100vh;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--sidebar-border);
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.04);
      z-index: 60;
      display: flex;
      flex-direction: column;
      padding: 18px;
      overflow: hidden; /* 顶部按钮不滚动，滚动交给下方区域 */
      transition: width 0.22s ease;
      /* 本身为 fixed，可作为绝对定位子元素参考 */
    }

    .right-sidebar.expanded {
      width: 864px; /* 360 * 2.4 */
      padding-top: 60px; /* 给左上角返回按钮留出空间，避免遮挡内容 */
    }

    .right-sidebar-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 12px;
      padding: 2px 2px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .right-sidebar-card {
      /* 收缩态：按钮不需要再套一层“卡片框” */
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1 1 auto;
      overflow: hidden; /* 只允许下方动态区域滚动 */
    }

    .right-module-content {
      display: none;
      flex: 0 0 auto; /* 让下方 AI 区域有稳定空间 */
      margin-top: 12px;
      border-radius: 16px;
      min-height: 220px;
      background: transparent;
      overflow: auto;
      max-height: 54vh; /* 避免把 AI 区域挤到看不见 */
    }

    /* Right module page (expanded content) */
    .module-page {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 25px -18px rgba(15, 23, 42, 0.35);
      padding: 14px;
    }

    .module-page-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .module-page-title {
      font-weight: 900;
      font-size: 14px;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .module-inline-back {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      width: 38px;
      height: 34px;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: var(--text); /* 确保返回图标不会变成白色 */
    }

    .module-inline-back:hover {
      background: var(--soft);
      border-color: #c8bceb;
    }

    .module-inline-back svg {
      width: 16px;
      height: 16px;
      display: block;
      color: currentColor;
    }

    .module-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: stretch;
    }

    @media (max-width: 1100px) {
      .right-sidebar.expanded .module-grid {
        grid-template-columns: 1fr;
      }
    }

    .module-action-btn {
      border: 1px solid var(--line);
      background: #f9fbff;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-height: 72px;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.06s ease;
    }

    .module-action-btn:hover {
      background: var(--soft-2);
      border-color: #c8bceb;
    }

    .module-action-btn:active {
      transform: translateY(1px);
    }

    .module-action-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: var(--brand-mid);
      margin-top: 1px;
    }

    .module-action-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .module-action-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .module-action-title {
      font-weight: 900;
      font-size: 13px;
      color: var(--text);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 1.35em;
    }

    .module-action-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 1.35em;
    }

    .module-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #ece8ff;
    }

    .module-paragraph {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .module-list {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
    }

    .schedule-wrap {
      display: grid;
      gap: 12px;
    }

    .schedule-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .schedule-board {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .schedule-head-row,
    .schedule-body-row {
      width: 100%;
      display: grid;
      grid-template-columns: 56px repeat(5, minmax(0, 1fr));
    }

    .schedule-head-row {
      border-bottom: 1px solid #d7d9df;
      background: #f4f5f7;
    }

    .schedule-body-row {
      background: #fff;
    }

    .schedule-time-head {
      border-right: 1px solid #d7d9df;
      font-size: 12px;
      font-weight: 800;
      color: #445;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
    }

    .schedule-day-head {
      border-right: 2px solid #b8c1d2;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #111827;
    }

    .schedule-time-body {
      border-right: 1px solid #d7d9df;
    }

    .schedule-grid {
      min-width: 0;
      width: 100%;
      display: grid;
      grid-template-columns: 56px repeat(5, minmax(0, 1fr));
      grid-template-rows: 58px auto;
    }

    .schedule-cell {
      border-right: 1px solid #d7d9df;
      border-bottom: 1px solid #d7d9df;
      box-sizing: border-box;
    }

    .schedule-head {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      background: #f4f5f7;
    }

    .schedule-head-day {
      width: 100%;
      display: grid;
      gap: 2px;
      justify-items: center;
      padding-top: 2px;
    }

    .schedule-head-lanes {
      width: calc(100% - 10px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 10px;
      color: #6b7280;
      font-weight: 700;
    }

    .schedule-head-lanes span {
      text-align: center;
      border: 1px solid #d5d9e6;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      line-height: 1.2;
      padding: 1px 0;
    }

    .schedule-head-time {
      font-size: 12px;
      color: #445;
      font-weight: 700;
    }

    .schedule-time-col {
      position: relative;
      height: var(--schedule-height, 480px);
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 19px,
          #e5e7ee 19px,
          #e5e7ee 20px
        );
    }

    .schedule-time-label {
      position: absolute;
      left: 6px;
      transform: translateY(0);
      font-size: 9px;
      color: #4a4f5c;
      line-height: 1;
      background: #fff;
      padding: 0 2px 0 0;
      z-index: 3;
    }

    .schedule-day-col {
      position: relative;
      height: var(--schedule-height, 480px);
      border-right: 2px solid #b8c1d2;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 19px,
          #e5e7ee 19px,
          #e5e7ee 20px
        );
    }

    .schedule-lane-divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 58%;
      width: 0;
      border-left: 1px dashed #e2e8f3;
      pointer-events: none;
    }

    .schedule-lane-tag {
      position: absolute;
      top: 6px;
      font-size: 10px;
      color: #677084;
      background: rgba(255, 255, 255, 0.92);
      padding: 1px 5px;
      border-radius: 999px;
      border: 1px solid #d9dce8;
      pointer-events: none;
    }

    .schedule-lane-tag.left {
      left: 6px;
    }

    .schedule-lane-tag.right {
      right: 6px;
    }

    .schedule-item {
      position: absolute;
      border-radius: 8px;
      border: 1px solid rgba(92, 109, 160, 0.35);
      box-shadow: 0 2px 10px rgba(24, 39, 75, 0.08);
      padding: 4px 5px;
      overflow: hidden;
      font-size: 10px;
      line-height: 1.25;
      box-sizing: border-box;
      z-index: 2;
      transform-origin: center top;
      will-change: transform, opacity, filter;
    }

    .schedule-item.course {
      color: #f8fbff;
    }

    .schedule-item.course.course-lec {
      background: #6d28d9; /* purple for lecture */
      border-color: rgba(88, 28, 135, 0.78);
      color: #faf7ff;
    }

    .schedule-item.course.course-lab {
      background: #c4b5fd; /* light purple for lab/practical */
      border-color: rgba(124, 58, 237, 0.45);
      color: #3b216b;
    }

    .schedule-item.course.schedule-entering {
      animation: scheduleCourseEnter 0.42s cubic-bezier(0.2, 0.85, 0.25, 1.1) both;
    }

    .schedule-item.course.schedule-removing {
      pointer-events: none;
      animation: scheduleCourseRemove 0.28s ease-in forwards;
    }

    @keyframes scheduleCourseEnter {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.96);
        filter: saturate(0.92);
        box-shadow: 0 0 0 rgba(109, 40, 217, 0);
      }
      58% {
        opacity: 1;
        transform: translateY(-2px) scale(1.015);
        filter: saturate(1.08);
        box-shadow: 0 8px 22px rgba(109, 40, 217, 0.22);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: saturate(1);
        box-shadow: 0 2px 10px rgba(24, 39, 75, 0.08);

      "en-US": {
        appTitle: "XJTLU Life Assistant",
        account: "Account",
        newChat: "+ New chat",
        clearChat: "Clear chat",
        history: "History",
        boardService: "Boards",

        logout: "Sign out",

        emptyReply: "(empty reply)",
        loadingRecommendations: "Loading recommendations...",
        noDetails: "(No details yet)",
        generatingDetails: "Generating more detailed content...",
        recommendation: "Recommendation",
        fillSuggestion: "Use this suggestion in input",
        back: "Back",
        retry: "Regenerate",
        copy: "Copy answer",
        copied: "Copied",

          study: "Learning Support",
          intern: "Internships and Jobs",
          campus: "Campus Activities",
          life: "Life Support",
          research: "Research Exploration",

    };

    function t(key) {
      const lang = getAppLanguage();
      return (UI_TEXT[lang] && UI_TEXT[lang][key]) || UI_TEXT["zh-CN"][key] || key;
    }

    const MODULE_NAME_MAP_ZH = {
      study: "学习帮助",
      intern: "实习就业",
      campus: "校园活动",
      life: "生活支持",
      research: "科研探索",
      schedule: "个人日程",
    };

    function getModuleName(moduleKey) {
      const lang = getAppLanguage();
      return (UI_TEXT[lang].modules && UI_TEXT[lang].modules[moduleKey]) || MODULE_NAME_MAP_ZH[moduleKey] || t("appTitle");
    }

    const LEFT_SIDEBAR_TITLE = "XJTLU生活助手";
    let currentModuleName = t("appTitle");
    let rightModuleKey = "";
    let rightPageStack = [];

      study: [],
      intern: [],
      campus: [],
      life: [],
      research: [],
      schedule: [],

    // 预生成缓存：大模块点击时一次性把“模块 + 子模块”的 QA 卡片都取回来
    // key 约定：大模块用 "campus"，子模块用 "campus_volunteer" 这种完整 key
    let dynamicModulesPrefetch = {};

    let dynamicRewriteLoadingByKey = {};
    let dynamicRewriteCacheByKey = {}; // { [key]: { ts:number, list:any[] } }
    let dynamicDetailCacheByKey = {}; // { [detailKey]: { ts:number, data:{title,desc,details,icon} } }
    const DYNAMIC_REWRITE_TTL_MS = 5 * 60 * 1000;
    let lastSortQueryByKey = {}; // { [key]: string } 用于“同 key 不同 query 重新排序”
    let isChatStreaming = false;
    let pendingListRewriteKeys = new Set();
    let pendingDetailCards = [];
    let isAwaitingAssistant = false;
    let lastClickedModuleKey = "";
    let activeDynamicKey = "";
    let activeDynamicCard = null;
    // 右侧 AI 区域视图模式：详情展开时，后台可更新数据，但不要把当前详情 UI 刷掉
    let dynamicViewMode = "list"; // "list" | "detail"
    const ONLINE_RUNTIME_POLICY_URL = "/api/runtime_policy";
    let onlineRuntimePolicy = { enabled: true, message: "", version: "" };
    let onlineRuntimePolicyTimer = null;

    function getOnlineRuntimePolicyMessage() {
      const fallback = isEnglishUi()
        ? "Service is temporarily paused. Please try again later."
        : "服务暂时暂停，请稍后再试。";
      return onlineRuntimePolicy.message || fallback;
    }

    function applyOnlineRuntimePolicy(policy = onlineRuntimePolicy) {
      onlineRuntimePolicy = {
        enabled: !(policy && policy.enabled === false),
        message: String((policy && policy.message) || ""),
        version: String((policy && policy.version) || ""),
      };
      const disabled = onlineRuntimePolicy.enabled === false;
      if (sendBtn) sendBtn.disabled = disabled || isAwaitingAssistant;
      if (inputEl) {
        inputEl.disabled = disabled || isAwaitingAssistant;
        inputEl.placeholder = disabled ? getOnlineRuntimePolicyMessage() : t("placeholder");
      }
      if (!statusEl) return;
      if (disabled) {
        statusEl.textContent = getOnlineRuntimePolicyMessage();
      } else if (!isAwaitingAssistant) {
        statusEl.textContent = t("ready");
      }
    }

    async function refreshOnlineRuntimePolicy() {
      try {
        const res = await fetch(ONLINE_RUNTIME_POLICY_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("runtime policy unavailable");
        applyOnlineRuntimePolicy(await res.json());
      } catch (e) {
        // 本地 file/静态预览没有 Netlify 函数时保持可用，线上由接口实时控制。
        applyOnlineRuntimePolicy({ enabled: true });
      }
    }

    function startOnlineRuntimePolicyPolling() {
      refreshOnlineRuntimePolicy();
      if (onlineRuntimePolicyTimer) window.clearInterval(onlineRuntimePolicyTimer);
      onlineRuntimePolicyTimer = window.setInterval(refreshOnlineRuntimePolicy, 15000);
    }

    function updateLeftSidebarModuleLabel() {
      if (!leftSidebarModuleLabelEl) return;
      // 左侧栏标题固定，不跟随右侧模块变化
      leftSidebarModuleLabelEl.textContent = t("appTitle");
    }

    function applyStaticLanguage() {
      document.documentElement.lang = getAppLanguage();
      document.title = t("appTitle");
      updateLeftSidebarModuleLabel();
      const headerTitle = document.querySelector(".header-title");
      if (headerTitle) headerTitle.textContent = t("appTitle");
      const loginTitle = document.querySelector(".login-title");
      if (loginTitle) loginTitle.textContent = t("account");
      if (btnNewChatEl) btnNewChatEl.textContent = t("newChat");
      if (btnClearEl) btnClearEl.textContent = t("clearChat");
      const sidebarHint = document.querySelector(".sidebar-hint");
      if (sidebarHint) sidebarHint.textContent = t("history");
      if (rightSidebarTitleEl && !rightModuleKey) rightSidebarTitleEl.textContent = t("boardService");
      if (statusEl && (statusEl.textContent === "就绪" || statusEl.textContent === "Ready")) {
        statusEl.textContent = t("ready");
      }
      const emptyTitle = document.querySelector(".empty-prompt-title");
      if (emptyTitle) emptyTitle.textContent = t("emptyTitle");
      const emptySub = emptyPromptEl ? emptyPromptEl.querySelector("div:nth-child(2)") : null;
      if (emptySub) emptySub.textContent = t("emptySub");
      if (inputEl) inputEl.placeholder = t("placeholder");
      if (sendBtn) sendBtn.setAttribute("aria-label", t("send"));
      if (rightBackBtnEl) {
        rightBackBtnEl.setAttribute("aria-label", t("back"));
        rightBackBtnEl.setAttribute("title", t("back"));
      }
      document.querySelectorAll(".right-module-btn").forEach((btn) => {
        const key = btn.dataset.module || "";
        const label = btn.querySelector(".right-module-btn-text");
        if (label) label.textContent = getModuleName(key);
        const sub = btn.querySelector(".right-module-btn-sub");
        if (sub && key === "schedule") sub.textContent = t("scheduleSub");
      });
      if (onlineRuntimePolicy && onlineRuntimePolicy.enabled === false) {
        applyOnlineRuntimePolicy(onlineRuntimePolicy);
      }
    }

    function setRightPageStack(stack) {
      rightPageStack = Array.isArray(stack) ? stack : [];
    }

    function pushRightPage(page) {
      rightPageStack.push(page);
    }

    function popRightPage() {
      rightPageStack.pop();
    }

    function currentRightPage() {
      return rightPageStack[rightPageStack.length - 1] || null;
    }

    function svgIcon(name) {

            <rect x="3" y="7" width="18" height="14" rx="2"></rect>

      } else {

        h = Number(mt[1]);

      if (!Number.isFinite(h) || !Number.isFinite(m)) return "";

        if (token === "日" || token === "天" || token === "7") return { day: "sun", unsupported: true };

    function _extractDayPeriod(text) {
      const s = String(text || "");
      if (/\u4e0a\u5348|morning/i.test(s)) return "morning";
      if (/\u4e2d\u5348|noon/i.test(s)) return "noon";
      if (/\u4e0b\u5348|afternoon/i.test(s)) return "afternoon";
      if (/\u665a\u4e0a|\u508d\u665a|evening|night/i.test(s)) return "evening";
      return "";
    }

    function _normalizeSchedulePeriod(period) {
      const s = String(period || "").toLowerCase();
      if (/morning|\u4e0a\u5348/.test(s)) return "morning";
      if (/noon|\u4e2d\u5348/.test(s)) return "noon";
      if (/afternoon|\u4e0b\u5348/.test(s)) return "afternoon";
      if (/evening|night|\u665a\u4e0a|\u508d\u665a/.test(s)) return "evening";
      return "";
    }

    function _adjustHmByDayPeriod(hm, period) {
      const p = _normalizeSchedulePeriod(period);
      if (!hm || (p !== "afternoon" && p !== "evening")) return hm;
      const [hh, mm] = String(hm).split(":").map(Number);
      if (!Number.isFinite(hh) || hh >= 12) return hm;
      return `${String(hh + 12).padStart(2, "0")}:${String(mm || 0).padStart(2, "0")}`;
    }

    function _parseHmTokenSmart(raw, period = "") {
      const direct = _parseHmToken(raw);
      if (direct) return _adjustHmByDayPeriod(direct, period);
      const t = String(raw || "").trim().replace(/\s+/g, "");
      const m = t.match(/^([\u96f6\u4e00\u4e8c\u4e24\u4e09\u56db\u4e94\u516d\u4e03\u516b\u4e5d\u5341]{1,3})\u70b9(?:(\d{1,2})\u5206?)?$/);
      if (!m) return "";
      const h = _parseChineseHourToken(m[1]);
      const minute = m[2] != null ? Number(m[2]) : 0;
      if (!Number.isFinite(h) || !Number.isFinite(minute) || h < 0 || h > 23 || minute < 0 || minute > 59) return "";
      return _adjustHmByDayPeriod(`${String(h).padStart(2, "0")}:${String(minute).padStart(2, "0")}`, period);
    }

    function _extractTimeRangeSmart(text) {
      const s = String(text || "");
      const token = "(?:\\d{1,2}(?:[:：.]\\d{1,2}|\\u70b9(?:\\d{1,2})?(?:\\u5206)?)?|[\\u96f6\\u4e00\\u4e8c\\u4e24\\u4e09\\u56db\\u4e94\\u516d\\u4e03\\u516b\\u4e5d\\u5341]{1,3}\\u70b9(?:\\d{1,2})?(?:\\u5206)?)";
      const m = s.match(new RegExp(`(${token})\\s*(?:\\u5230|\\u81f3|~|\\uFF5E|-|\\u2014|\\u2013)\\s*(${token})`));
      if (!m) {
        const fallback = _extractTimeRange(text);
        const period = _extractDayPeriod(s);
        return {
          start: _adjustHmByDayPeriod(fallback.start, period),
          end: _adjustHmByDayPeriod(fallback.end, period),
          raw: fallback.raw || "",
          period,
        };
      }
      const period = _extractDayPeriod(s);
      return {
        start: _parseHmTokenSmart(m[1], period),
        end: _parseHmTokenSmart(m[2], period),
        raw: m[0] || "",
        period,
      };
    }

    function _extractActivityName(text, timeRangeRaw) {
      const s = String(text || "");
      const explicit = s.match(/(?:加|新增|添加|安排|创建|add|create|schedule)(?:个|一个)?(?:活动|event)?[:：\s]*([^\n，。,；;]+)/i);
      if (explicit && explicit[1]) {
        const v = explicit[1].trim();
        if (v) return v;
      }
      let t = s;
      if (timeRangeRaw) t = t.replace(timeRangeRaw, " ");
      t = t
        .replace(/(?:周|星期|礼拜)\s*[一二三四五六日天1234567]/g, " ")
        .replace(/\b(mon(?:day)?|tue(?:s|sday)?|wed(?:nesday)?|thu(?:r|rs|rsday)?|fri(?:day)?|sat(?:urday)?|sun(?:day)?)\b/gi, " ")
        .replace(/(?:加|新增|添加|安排|创建|活动|日程|行程|event|schedule|add|create|帮我|请|一下|一个|个)/gi, " ")
        .replace(/(?:简介|介绍|说明|备注|intro|description)\s*[:：].*$/i, " ")
        .replace(/[，,。；;]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      return t;
    }

    function _extractActivityIntro(text) {
      const s = String(text || "");
      const m = s.match(/(?:简介|介绍|说明|备注|intro|description)\s*[:：]\s*([^\n]+)/i);
      return m && m[1] ? m[1].trim() : "";
    }

    function _loadScheduleCourseItems() {
      try {
        const raw = localStorage.getItem(SCHEDULE_COURSE_STORAGE_KEY);
        if (!raw) return _cloneDefaultScheduleCourses();
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return _cloneDefaultScheduleCourses();
        const normalized = arr
          .map((x) => {
            const day = _normalizeActivityDayToken(x && x.day);
            const start = _parseHmToken((x && x.start) || "");
            const end = _parseHmToken((x && x.end) || "");
            const name = String((x && x.name) || "").trim();
            const location = String((x && x.location) || "").trim();
            const teacher = String((x && x.teacher) || "").trim();
            if (!day || !name || !start || !end) return null;
            if (!_isWithinScheduleRange(start, end, SCHEDULE_RANGE_START_MIN, SCHEDULE_RANGE_END_MIN)) return null;
            return { day, name, location, teacher, start, end };
          })
          .filter(Boolean);
        return normalized.length ? _sortScheduleCourseItems(normalized) : _cloneDefaultScheduleCourses();
      } catch (e) {
        return _cloneDefaultScheduleCourses();
      }
    }

    function _loadScheduleActivityItems() {

        const raw = localStorage.getItem(SCHEDULE_ACTIVITY_STORAGE_KEY);

        if (!Array.isArray(arr)) return _cloneDefaultScheduleActivities();

          .map((x) => {
            const day = _normalizeActivityDayToken(x && x.day);
            const [st, ed] = String((x && x.time) || "").split("-");
            const start = _parseHmToken(st);
            const end = _parseHmToken(ed);
            const name = String((x && x.name) || "").trim();
            const intro = String((x && x.intro) || "").trim();
            if (!day || !name || !start || !end) return null;
            if (!_isWithinScheduleRange(start, end, SCHEDULE_RANGE_START_MIN, SCHEDULE_RANGE_END_MIN)) return null;
            return { day, name, intro, time: `${start}-${end}` };
          })
          .filter(Boolean);
        return normalized.length ? _sortScheduleActivityItems(normalized) : _cloneDefaultScheduleActivities();

    }

    function _saveScheduleActivityItems() {
      try {
        localStorage.setItem(SCHEDULE_ACTIVITY_STORAGE_KEY, JSON.stringify(scheduleActivityItems));

    function _detectScheduleAction(text) {
      const s = String(text || "");
      if (/(删除|删掉|移除|取消|remove|delete|cancel)/i.test(s)) return "delete";
      if (/(修改|调整|改到|改成|改为|变更|更新|reschedule|change|move|update)/i.test(s)) return "update";
      if (/(加|新增|添加|安排|创建|加入|add|create|schedule|安排到)/i.test(s)) return "add";
      return "";
    }

    function _hasCourseCodeLikeToken(text) {
      return /[A-Za-z]{2,}\d{2,}[A-Za-z0-9]*/.test(String(text || ""));
    }

    function _hasExplicitCourseTarget(text) {
      const s = String(text || "");
      return /(?:\u8bfe\u7a0b\u8868|\u8bfe\u8868|\u8bfe\u7a0b|\u4e0a\u8bfe|\u6388\u8bfe|\u8bb2\u5ea7\u8bfe|\u6559\u5ba4|\u8001\u5e08|\u6559\u5e08|lecture|class|course|timetable|room|teacher|lec|lab|prac)/i.test(s) || _hasCourseCodeLikeToken(s);
    }

    function _hasExplicitActivityTarget(text) {
      const s = String(text || "");
      return /(?:\u6821\u56ed\u6d3b\u52a8|\u4e2a\u4eba\u6d3b\u52a8|\u6d3b\u52a8|\u884c\u7a0b|\u4e8b\u9879|\u4f1a\u8bae|event|activity|meeting|appointment)/i.test(s);
    }

    function _detectScheduleTarget(text) {
      const s = String(text || "");
      if (_hasExplicitCourseTarget(s)) return "course";
      if (_hasExplicitActivityTarget(s)) return "activity";
      if (/(课程表|课表|课程|上课|lecture|class|course|timetable|老师|教师|教室|room|teacher|lec|lab|prac)/i.test(s)) return "course";
      if (/(活动|行程|事项|会议|event|activity|meeting|appointment)/i.test(s)) return "activity";
      return "";
    }

    function _hasPersonalScheduleIntent(text) {
      const s = String(text || "");
      const action = _detectScheduleAction(s);
      const target = _detectScheduleTarget(s);
      const dayInfo = _extractWeekdayKey(s);
      const range = _extractTimeRangeSmart(s);
      if (/(个人日程|我的日程|日程表|日程修改|修改日程|课程表|课表|个人课表|我的课表|personal schedule|my schedule|course schedule|class schedule|timetable)/i.test(s)) {
        return true;
      }
      return !!(action && target && (dayInfo.day || range.start || /日程|schedule|calendar/i.test(s)));
    }

    function _isScheduleEllipsisIntent(text, focus = null) {
      const s = String(text || "").trim();
      if (!s) return false;
      const action = _detectScheduleAction(s);
      if (!action || action === "add") return false;
      if (_hasPersonalScheduleIntent(s)) return true;
      if (!focus) return false;
      const hasPronounRef = /(?:\u5b83|\u5b83\u4eec|\u8fd9\u4e2a|\u90a3\u4e2a|\u521a\u624d|\u4e0a\u4e00\u4e2a|it|that|previous)/i.test(s);
      if (hasPronounRef) return true;
      if (action === "delete" && s.length <= 12) return true;
      if (action === "update" && (_extractWeekdayKey(s).day || _extractTimeRangeSmart(s).start)) return true;
      return /^(删了|删除|删除它|删掉|删掉它|取消|取消它|取消刚才那个|把它删了|把刚才那个删了|改了|修改它|调整它|改一下|delete it|remove it|cancel it|delete that|remove that|change it|update it)$/i.test(s);
    }

    function _extractScheduleField(text, labelRegex) {
      const s = String(text || "");
      const m = s.match(labelRegex);
      return m && m[1] ? m[1].trim().replace(/[，,。；;]+$/g, "").trim() : "";
    }

    function _extractCourseLocation(text) {
      return _extractScheduleField(text, /(?:地点|教室|位置|location|room)\s*[:：]?\s*([A-Za-z0-9_\- ]{2,40})/i);
    }

    function _extractCourseTeacher(text) {
      return _extractScheduleField(text, /(?:老师|教师|授课人|teacher|lecturer)\s*[:：]?\s*([^，,。；;\n]{1,40})/i);
    }

    function _stripScheduleNoise(text, kind, timeRangeRaw) {
      let t = String(text || "");
      if (timeRangeRaw) t = t.replace(timeRangeRaw, " ");
      t = t
        .replace(/(?:周|星期|礼拜)\s*[一二三四五六日天1234567]/g, " ")
        .replace(/\b(mon(?:day)?|tue(?:s|sday)?|wed(?:nesday)?|thu(?:r|rs|rsday)?|fri(?:day)?|sat(?:urday)?|sun(?:day)?)\b/gi, " ")
        .replace(/(?:地点|教室|位置|location|room)\s*[:：]?\s*[A-Za-z0-9_\- ]{2,40}/gi, " ")
        .replace(/(?:老师|教师|授课人|teacher|lecturer)\s*[:：]?\s*[^，,。；;\n]{1,40}/gi, " ")
        .replace(/(?:简介|介绍|说明|备注|intro|description)\s*[:：].*$/i, " ")
        .replace(/(?:个人日程|我的日程|日程表|日程|行程|课程表|课表|个人课表|我的课表|calendar|personal schedule|my schedule|course schedule|class schedule|timetable)/gi, " ")
        .replace(/(?:帮我|请|一下|一个|一条|一门|一节|个|门|节)/gi, " ")
        .replace(/(?:加|新增|添加|安排|创建|加入|删除|删掉|移除|取消|修改|调整|改到|改成|改为|变更|更新|add|create|remove|delete|cancel|reschedule|change|move|update|schedule)/gi, " ");
      if (kind === "course") t = t.replace(/(?:课程|上课|lecture|class|course|lec|lab|prac)/gi, " ");
      else t = t.replace(/(?:活动|事项|会议|event|activity|meeting|appointment)/gi, " ");
      return t.replace(/[，,。；;]+/g, " ").replace(/\s+/g, " ").trim();
    }

    function _extractScheduleName(text, kind, action, timeRangeRaw) {
      const s = String(text || "");
      const targetWords = kind === "course" ? "(?:课程|课|class|course|lecture)?" : "(?:活动|事项|event|activity|meeting)?";
      if (action === "add") {
        const explicit = s.match(new RegExp(`(?:加|新增|添加|安排|创建|加入|add|create|schedule)(?:个|一个|一条|一门|一节)?${targetWords}[:：\\s]*([^\\n，。,；;]+)`, "i"));
        if (explicit && explicit[1]) {
          const v = _stripScheduleNoise(explicit[1], kind, timeRangeRaw);
          if (v) return v;
        }
      }
      const cleaned = _stripScheduleNoise(s, kind, timeRangeRaw);
      if (!cleaned) return "";
      return cleaned.length > 80 ? cleaned.slice(0, 80).trim() : cleaned;
    }

    function _extractScheduleMatchName(text, kind, action, timeRangeRaw) {
      const s = String(text || "");
      const beforeChange = s.match(/(?:把|将)?\s*([^，。；;\n]{2,80}?)\s*(?:改到|改成|改为|调整到|调整为|变更为|更新为|删掉|删除|移除|取消|remove|delete|cancel|reschedule|change|move|update)/i);
      if (beforeChange && beforeChange[1]) {
        const v = _stripScheduleNoise(beforeChange[1], kind, timeRangeRaw);
        if (v) return v;
      }
      const afterVerb = s.match(/(?:修改|调整|更新|删除|删掉|移除|取消|remove|delete|cancel|change|update)\s*(?:课程|课表|课程表|活动|日程|event|course|class)?[:：\s]*([^，。；;\n]{2,80})/i);
      if (afterVerb && afterVerb[1]) {
        const v = _stripScheduleNoise(afterVerb[1], kind, timeRangeRaw);
        if (v) return v;
      }
      if (action === "delete" || action === "update") return _extractScheduleName(s, kind, action, timeRangeRaw);
      return "";
    }

    function _normalizeScheduleCommand(raw) {
      const src = raw && typeof raw === "object" ? raw : {};
      const item0 = src.item && typeof src.item === "object" ? src.item : {};
      const item = { ...item0 };
      if (item.day) item.day = _normalizeActivityDayToken(item.day);
      if (item.start) item.start = _parseHmToken(item.start);
      if (item.end) item.end = _parseHmToken(item.end);
      if (item.period) item.period = _normalizeSchedulePeriod(item.period);
      if (item.period && item.start) item.start = _adjustHmByDayPeriod(item.start, item.period);
      if (item.period && item.end) item.end = _adjustHmByDayPeriod(item.end, item.period);
      if (!item.start || !item.end) {
        const time = String(item.time || "");
        if (time.includes("-")) {
          const [st, ed] = time.split("-");
          item.start = item.start || _parseHmToken(st);
          item.end = item.end || _parseHmToken(ed);
        }
      }
      const action = String(src.action || "").toLowerCase();
      const target = String(src.target || "").toLowerCase();
      return {
        handled: !!src.handled,
        action: ["add", "update", "delete", "open", "none"].includes(action) ? action : "",
        target: target === "course" || target === "activity" ? target : "",
        matchName: String(src.matchName || src.match_name || "").trim(),
        item,
        confidence: Number(src.confidence || 0),
        rawText: String(src.rawText || src.text || "").trim(),
      };
    }

    function _focusToScheduleCommand(text, focus) {
      const action = _detectScheduleAction(text);
      if (!focus || !action || action === "add") return null;
      const target = focus.target || "activity";
      const item = { ...(focus.item || {}) };
      const dayInfo = _extractWeekdayKey(text);
      const range = _extractTimeRangeSmart(text);
      if (dayInfo.day) item.day = dayInfo.day;
      if (range.start) item.start = range.start;
      if (range.end) item.end = range.end;
      if (range.period) item.period = range.period;
      if (target === "course") {
        const location = _extractCourseLocation(text);
        const teacher = _extractCourseTeacher(text);
        if (location) item.location = location;
        if (teacher) item.teacher = teacher;
      } else {
        const intro = _extractActivityIntro(text);
        if (intro) item.intro = intro;
      }
      return {
        handled: true,
        action,
        target,
        matchName: String(item.name || focus.matchName || "").trim(),
        item,
        confidence: 0.9,
        rawText: String(text || "").trim(),
      };
    }

    function _parseScheduleCommandLocal(text, focus = null) {
      const s = String(text || "").trim();
      if (!s) return null;
      if (!_hasPersonalScheduleIntent(s)) {
        if (_isScheduleEllipsisIntent(s, focus)) return _focusToScheduleCommand(s, focus);
        return null;
      }
      const action = _detectScheduleAction(s) || "open";
      const target = _detectScheduleTarget(s) || (focus && focus.target) || "";
      const dayInfo = _extractWeekdayKey(s);
      const range = _extractTimeRangeSmart(s);
      const item = {};
      if (dayInfo.day) item.day = dayInfo.day;
      if (range.start) item.start = range.start;
      if (range.end) item.end = range.end;
      if (range.period) item.period = range.period;
      if (target === "course") {
        item.location = _extractCourseLocation(s);
        item.teacher = _extractCourseTeacher(s);
      } else {
        item.intro = _extractActivityIntro(s);
      }
      if (action === "add") {
        item.name = _extractScheduleName(s, target, action, range.raw);
      }
      const matchName = action === "update" || action === "delete" ? _extractScheduleMatchName(s, target, action, range.raw) : "";
      if ((action === "delete" || action === "update") && !matchName && focus && (focus.target || target) === target) {
        const focusItem = focus.item || {};
        return {
          handled: true,
          action,
          target,
          matchName: String(focusItem.name || focus.matchName || "").trim(),
          item: { ...focusItem, ...item },
          confidence: 0.86,
          rawText: s,
          _dayUnsupported: dayInfo.unsupported,
        };
      }
      return { handled: true, action, target, matchName, item, confidence: action === "open" ? 0.88 : 0.7, rawText: s, _dayUnsupported: dayInfo.unsupported };
    }

    function _scheduleSnapshotForModel() {
      const courses = (Array.isArray(scheduleCourseItems) ? scheduleCourseItems : []).map((x) => ({
        name: String((x && x.name) || ""),
        day: String((x && x.day) || ""),
        start: String((x && x.start) || ""),
        end: String((x && x.end) || ""),
        location: String((x && x.location) || ""),
        teacher: String((x && x.teacher) || ""),
      }));
      const activities = (Array.isArray(scheduleActivityItems) ? scheduleActivityItems : []).map((x) => {
        const [start, end] = String((x && x.time) || "").split("-");
        return {
          name: String((x && x.name) || ""),
          day: String((x && x.day) || ""),
          start: String(start || ""),
          end: String(end || ""),
          intro: String((x && x.intro) || ""),
        };
      });
      return { courses, activities };
    }

    async function _parseScheduleCommandByModel(text, context = []) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 7000);
      try {
        const res = await fetch("/api/parse_schedule_command", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: controller.signal,
          body: JSON.stringify({ text, language: getAppLanguage(), context, schedule: _scheduleSnapshotForModel() }),
        });
        if (!res.ok) return null;
        const data = await res.json();
        return _normalizeScheduleCommand(data);
      } catch (e) {
        return null;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function _isScheduleCommandLocallyComplete(command) {
      const cmd = _normalizeScheduleCommand(command);
      if (!cmd.handled || !cmd.action) return false;
      const item = cmd.item || {};
      if (cmd.action === "open" || cmd.action === "none") return true;
      if (cmd.action === "add") {
        return !!(cmd.target && item.name && item.day && item.start && item.end);
      }
      if (cmd.action === "delete") {
        return !!(cmd.matchName || item.name || (item.day && (item.period || (item.start && item.end))));
      }
      if (cmd.action === "update") {
        const hasReference = !!(cmd.matchName || item.name);
        const hasChange = !!(item.day || item.period || item.start || item.end || item.location || item.teacher || item.intro);
        return hasReference && hasChange;
      }
      return false;
    }

    function _appendScheduleAssistantReply(reply, session) {
      const assistantMessageId = createMessageId();
      appendMessage("assistant", reply, assistantMessageId);
      if (session) session.messages.push({ role: "assistant", text: reply, id: assistantMessageId });
    }

    function _openScheduleBoard() {
      lastClickedModuleKey = "schedule";
      dynamicViewMode = "list";
      expandRightSidebarAndCollapseLeft("schedule");
    }

    function _normalizeScheduleFocus(target, item, matchName = "") {
      const src = item && typeof item === "object" ? item : {};
      const start = src.start || String(src.time || "").split("-")[0] || "";
      const end = src.end || String(src.time || "").split("-")[1] || "";
      const name = String(src.name || matchName || "").trim();
      if (!name) return null;
      return {
        target: target === "course" ? "course" : "activity",
        matchName: name,
        item: {
          day: src.day || "",
          name,
          start,
          end,
          period: src.period || "",
          location: src.location || "",
          teacher: src.teacher || "",
          intro: src.intro || "",
        },
        ts: Date.now(),
      };
    }

    function _setScheduleFocus(target, item, matchName = "") {
      const focus = _normalizeScheduleFocus(target, item, matchName);
      if (focus) lastScheduleFocus = focus;
      return focus;
    }

    function _dayLabelToKey(label) {
      const s = String(label || "").trim().toLowerCase();
      const zh = { "周一": "mon", "周二": "tue", "周三": "wed", "周四": "thu", "周五": "fri" };
      if (zh[s]) return zh[s];
      if (s.startsWith("mon")) return "mon";
      if (s.startsWith("tue")) return "tue";
      if (s.startsWith("wed")) return "wed";
      if (s.startsWith("thu")) return "thu";
      if (s.startsWith("fri")) return "fri";
      return "";
    }

    function _focusFromScheduleReply(text) {
      const s = String(text || "").trim();
      if (!s) return null;
      let m = s.match(/已添加(课程|活动)：\s*([^（\n]+)（([^ ]+)\s+(\d{2}:\d{2})-(\d{2}:\d{2})）/);
      if (!m) m = s.match(/已修改(课程|活动)：\s*([^ ]+).*?现在是\s+([^ ]+)\s+(\d{2}:\d{2})-(\d{2}:\d{2})/);
      if (m) {
        return _normalizeScheduleFocus(m[1] === "课程" ? "course" : "activity", {
          name: m[2].trim(),
          day: _dayLabelToKey(m[3]),
          start: m[4],
          end: m[5],
        });
      }
      m = s.match(/Added\s+(class|activity):\s*(.+?)\s+on\s+([A-Z]{3}|Mon(?:day)?|Tue(?:sday)?|Wed(?:nesday)?|Thu(?:rsday)?|Fri(?:day)?)\s+(\d{2}:\d{2})-(\d{2}:\d{2})/i);
      if (!m) m = s.match(/Updated\s+(class|activity):\s*(.+?)\s+is now on\s+([A-Z]{3}|Mon(?:day)?|Tue(?:sday)?|Wed(?:nesday)?|Thu(?:rsday)?|Fri(?:day)?)\s+(\d{2}:\d{2})-(\d{2}:\d{2})/i);
      if (m) {
        return _normalizeScheduleFocus(m[1].toLowerCase() === "class" ? "course" : "activity", {
          name: m[2].trim(),
          day: _dayLabelToKey(m[3]),
          start: m[4],
          end: m[5],
        });
      }
      return null;
    }

    function _getRecentScheduleFocus(session) {
      if (lastScheduleFocus && lastScheduleFocus.item && lastScheduleFocus.item.name) return lastScheduleFocus;
      const msgs = session && Array.isArray(session.messages) ? session.messages : [];
      for (let i = msgs.length - 1; i >= 0; i--) {
        const m = msgs[i];
        if (!m || m.role !== "assistant") continue;
        const focus = _focusFromScheduleReply(m.text);
        if (focus) {
          lastScheduleFocus = focus;
          return focus;
        }
      }
      return null;
    }

    function _compactScheduleName(s) {
      return String(s || "").toLowerCase().replace(/[\s_\-:：，,。；;()（）]+/g, "");
    }

    function _findScheduleItemIndex(list, command) {
      const arr = Array.isArray(list) ? list : [];
      const item = (command && command.item) || {};
      const candidates = [command && command.matchName, item.name].map((x) => _compactScheduleName(x)).filter(Boolean);
      let bestIdx = -1;
      let bestScore = 0;
      arr.forEach((x, idx) => {
        const name = _compactScheduleName(x && x.name);
        let score = 0;
        candidates.forEach((cand) => {
          if (!cand || !name) return;
          if (cand === name) score = Math.max(score, 100);
          else if (name.includes(cand) || cand.includes(name)) score = Math.max(score, 82);
        });
        if (item.day && x.day === item.day) score += 5;
        if (item.start && item.end) {
          const sameTime = x.start === item.start && x.end === item.end;
          const sameActTime = x.time === `${item.start}-${item.end}`;
          if (sameTime || sameActTime) score = Math.max(score, 75);
        }
        if (score > bestScore) {
          bestScore = score;
          bestIdx = idx;
        }
      });
      return bestScore >= 75 ? bestIdx : -1;
    }

    function _scheduleItemTime(item) {
      const src = item || {};
      const start = src.start || String(src.time || "").split("-")[0] || "";
      const end = src.end || String(src.time || "").split("-")[1] || "";
      return { start, end, startMin: _toMinutes(start), endMin: _toMinutes(end) };
    }

    function _schedulePeriodRange(period) {
      const p = _normalizeSchedulePeriod(period);
      if (p === "morning") return { startMin: 9 * 60, endMin: 12 * 60 };
      if (p === "noon") return { startMin: 11 * 60, endMin: 13 * 60 };
      if (p === "afternoon") return { startMin: 12 * 60, endMin: 18 * 60 };
      if (p === "evening") return { startMin: 18 * 60, endMin: 19 * 60 };
      return null;
    }

    function _timeRangesOverlap(aStart, aEnd, bStart, bEnd) {
      if (!Number.isFinite(aStart) || !Number.isFinite(aEnd) || !Number.isFinite(bStart) || !Number.isFinite(bEnd)) return false;
      return Math.max(aStart, bStart) < Math.min(aEnd, bEnd);
    }

    function _levenshteinDistance(a, b) {
      const s = String(a || "");
      const t = String(b || "");
      if (s === t) return 0;
      if (!s.length) return t.length;
      if (!t.length) return s.length;
      let prev = Array.from({ length: t.length + 1 }, (_, i) => i);
      for (let i = 1; i <= s.length; i++) {
        const cur = [i];
        for (let j = 1; j <= t.length; j++) {
          const cost = s[i - 1] === t[j - 1] ? 0 : 1;
          cur[j] = Math.min(cur[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
        }
        prev = cur;
      }
      return prev[t.length];
    }

    function _scheduleNameSimilarityScore(candidate, actual) {
      const cand = _compactScheduleName(candidate);
      const name = _compactScheduleName(actual);
      if (!cand || !name) return 0;
      if (cand === name) return 100;
      if (cand.includes(name) || name.includes(cand)) return Math.min(94, 78 + Math.min(cand.length, name.length));
      const dist = _levenshteinDistance(cand, name);
      const ratio = 1 - dist / Math.max(cand.length, name.length, 1);
      if (ratio >= 0.9) return 92;
      if (ratio >= 0.82) return 84;
      if (ratio >= 0.74 && Math.min(cand.length, name.length) >= 6) return 76;
      return 0;
    }

    function _scheduleNameCandidates(command) {
      const item = (command && command.item) || {};
      const raw = String((command && command.rawText) || "");
      const base = [command && command.matchName, item.name];
      const tokenMatches = raw.match(/[A-Za-z]{2,}\d+[A-Za-z0-9]*/g) || [];
      return [...base, ...tokenMatches].map((x) => String(x || "").trim()).filter(Boolean);
    }

    function _findScheduleItemMatchSmart(list, command) {
      const arr = Array.isArray(list) ? list : [];
      const item = (command && command.item) || {};
      const candidates = _scheduleNameCandidates(command);
      const periodRange = _schedulePeriodRange(item.period);
      let best = { idx: -1, score: 0, nameScore: 0 };
      let secondScore = 0;
      arr.forEach((x, idx) => {
        const itemTime = _scheduleItemTime(x);
        let nameScore = 0;
        candidates.forEach((cand) => {
          nameScore = Math.max(nameScore, _scheduleNameSimilarityScore(cand, x && x.name));
        });

        let score = nameScore;
        if (item.day && x.day === item.day) score += 28;
        if (item.start && item.end) {
          const desiredStart = _toMinutes(item.start);
          const desiredEnd = _toMinutes(item.end);
          const exact = itemTime.start === item.start && itemTime.end === item.end;
          const overlaps = _timeRangesOverlap(desiredStart, desiredEnd, itemTime.startMin, itemTime.endMin);
          if (exact) score += 45;
          else if (overlaps) score += 28;
        } else if (periodRange && _timeRangesOverlap(periodRange.startMin, periodRange.endMin, itemTime.startMin, itemTime.endMin)) {
          score += 35;
        }

        if (score > best.score) {
          secondScore = best.score;
          best = { idx, score, nameScore };
        } else if (score > secondScore) {
          secondScore = score;
        }
      });
      const threshold = best.nameScore >= 76 ? 76 : 60;
      if (best.idx < 0 || best.score < threshold) return { idx: -1, score: best.score };
      if (best.score < 90 && secondScore > 0 && best.score - secondScore < 4) return { idx: -1, score: best.score };
      return best;
    }

    function _findScheduleItemIndexSmart(list, command) {
      return _findScheduleItemMatchSmart(list, command).idx;
    }

    function _scheduleMissingDetailsReply(kind) {
      if (isEnglishUi()) {
        return kind === "course"
          ? "I opened Personal Schedule. To change a class, include the class name, weekday, and time, for example: move DTS209TC Lec to Friday 10:00-11:50 in TC-FG-2001."
          : "I opened Personal Schedule. To change an activity, include the activity name, weekday, and time, for example: add CV Clinic on Tuesday 12:30-15:00.";
      }
      return kind === "course"
        ? "已打开个人日程。修改课程请尽量包含课程名、周几和时间，例如：把 DTS209TC Lec 改到周五 10:00-11:50，地点 TC-FG-2001。"
        : "已打开个人日程。修改活动请尽量包含活动名、周几和时间，例如：周二 12:30-15:00 新增活动 CV 诊断。";
    }

    async function _applyScheduleCommand(command, session) {
      const cmd = _normalizeScheduleCommand(command);
      if (!cmd.handled) return false;
      let kind = cmd.target || (cmd.action === "add" ? "activity" : "");
      const explicitKind = _detectScheduleTarget(cmd.rawText || "");
      if (explicitKind) kind = explicitKind;
      const action = cmd.action || "open";
      const item = cmd.item || {};
      _openScheduleBoard();

      if (action === "open" || action === "none") {
        _appendScheduleAssistantReply(_scheduleMissingDetailsReply(kind || "activity"), session);
        return true;
      }

      if (item.day && !SCHEDULE_DAY_KEYS.includes(item.day)) {
        const reply = isEnglishUi()
          ? "Personal Schedule currently supports Monday to Friday only."
          : "个人日程目前只支持周一到周五。";
        _appendScheduleAssistantReply(reply, session);
        return true;
      }

      if (!kind && action === "add") kind = "activity";
      let list = kind === "course" ? scheduleCourseItems : scheduleActivityItems;
      let save = kind === "course" ? _saveScheduleCourseItems : _saveScheduleActivityItems;
      let sort = kind === "course" ? _sortScheduleCourseItems : _sortScheduleActivityItems;
      let label = isEnglishUi() ? (kind === "course" ? "class" : "activity") : kind === "course" ? "课程" : "活动";

      if (action === "add") {
        const name = String(item.name || "").trim();
        if (!item.day || !item.start || !item.end || !name) {
          _appendScheduleAssistantReply(_scheduleMissingDetailsReply(kind), session);
          return true;
        }
        if (!_isWithinScheduleRange(item.start, item.end, SCHEDULE_RANGE_START_MIN, SCHEDULE_RANGE_END_MIN)) {
          const reply = isEnglishUi()
            ? "Time must be within 09:00-19:00 and end time must be later than start time."
            : "时间需在 09:00-19:00 之间，且结束时间要晚于开始时间。";
          _appendScheduleAssistantReply(reply, session);
          return true;
        }
        if (kind === "course") {
          const next = {
            day: item.day,
            name: name.slice(0, 60),
            location: String(item.location || "").trim().slice(0, 60),
            teacher: String(item.teacher || "").trim().slice(0, 60),
            start: item.start,
            end: item.end,
          };
          _setScheduleMotion("enter", kind, next);
          scheduleCourseItems = sort([...(scheduleCourseItems || []), next]);
          save();
          _setScheduleFocus(kind, next);
        } else {
          const next = {
            day: item.day,
            name: name.slice(0, 60),
            intro: String(item.intro || (isEnglishUi() ? "Added from chat command." : "通过对话指令新增。")).trim().slice(0, 120),
            time: `${item.start}-${item.end}`,
          };
          scheduleActivityItems = sort([...(scheduleActivityItems || []), next]);
          save();
          _setScheduleFocus(kind, next);
        }
        renderRightModule();
        _clearScheduleMotionSoon();
        const weekday = _eventWeekdayLabel(item.day, _scheduleLang());
        const reply = isEnglishUi()
          ? `Added ${label}: ${name} on ${weekday} ${item.start}-${item.end}.`
          : `已添加${label}：${name}（${weekday} ${item.start}-${item.end}）。`;
        _appendScheduleAssistantReply(reply, session);
        return true;
      }

      let idx = _findScheduleItemIndexSmart(list, cmd);
      if (idx < 0 && action !== "add" && !explicitKind) {
        const altKind = kind === "course" ? "activity" : "course";
        const altList = altKind === "course" ? scheduleCourseItems : scheduleActivityItems;
        const altIdx = _findScheduleItemIndexSmart(altList, cmd);
        if (altIdx >= 0) {
          kind = altKind;
          list = altList;
          save = kind === "course" ? _saveScheduleCourseItems : _saveScheduleActivityItems;
          sort = kind === "course" ? _sortScheduleCourseItems : _sortScheduleActivityItems;
          label = isEnglishUi() ? (kind === "course" ? "class" : "activity") : kind === "course" ? "课程" : "活动";
          idx = altIdx;
        }
      }
      if (idx < 0) {
        const reply = isEnglishUi()
          ? `I opened Personal Schedule, but could not find the ${label} to ${action === "delete" ? "delete" : "update"}. Please include the exact name shown on the card.`
          : `已打开个人日程，但没有找到要${action === "delete" ? "删除" : "修改"}的${label}。请尽量写出卡片上的完整名称。`;
        _appendScheduleAssistantReply(reply, session);
        return true;
      }

      if (action === "delete") {
        const old = list[idx];
        await _animateScheduleRemoval(kind, old);
        if (kind === "course") {
          scheduleCourseItems = scheduleCourseItems.filter((_, i) => i !== idx);
          save();
        } else {
          scheduleActivityItems = scheduleActivityItems.filter((_, i) => i !== idx);
          save();
        }
        lastScheduleFocus = null;
        renderRightModule();
        const reply = isEnglishUi() ? `Deleted ${label}: ${old.name}.` : `已删除${label}：${old.name}。`;
        _appendScheduleAssistantReply(reply, session);
        return true;
      }

      const old = list[idx];
      const nextDay = item.day || old.day;
      const nextStart = item.start || old.start || String(old.time || "").split("-")[0];
      const nextEnd = item.end || old.end || String(old.time || "").split("-")[1];
      if (!_isWithinScheduleRange(nextStart, nextEnd, SCHEDULE_RANGE_START_MIN, SCHEDULE_RANGE_END_MIN)) {
        const reply = isEnglishUi()
          ? "Time must be within 09:00-19:00 and end time must be later than start time."
          : "时间需在 09:00-19:00 之间，且结束时间要晚于开始时间。";
        _appendScheduleAssistantReply(reply, session);
        return true;
      }
      if (kind === "course") {
        const next = {
          ...old,
          day: nextDay,
          start: nextStart,
          end: nextEnd,
          location: String(item.location || old.location || "").trim(),
          teacher: String(item.teacher || old.teacher || "").trim(),
        };
        scheduleCourseItems = sort(scheduleCourseItems.map((x, i) => (i === idx ? next : x)));
        save();
        _setScheduleFocus(kind, next);
      } else {
        const next = {
          ...old,
          day: nextDay,
          time: `${nextStart}-${nextEnd}`,
          intro: String(item.intro || old.intro || "").trim(),
        };
        scheduleActivityItems = sort(scheduleActivityItems.map((x, i) => (i === idx ? next : x)));
        save();
        _setScheduleFocus(kind, next);
      }
      renderRightModule();
      const weekday = _eventWeekdayLabel(nextDay, _scheduleLang());
      const reply = isEnglishUi()
        ? `Updated ${label}: ${old.name} is now on ${weekday} ${nextStart}-${nextEnd}.`
        : `已修改${label}：${old.name} 现在是 ${weekday} ${nextStart}-${nextEnd}。`;
      _appendScheduleAssistantReply(reply, session);
      return true;
    }

    async function tryHandleScheduleCommand(inputText, session) {
      const text = String(inputText || "").trim();
      if (!text) return false;
      const pseudoContext = typeof getRecentPseudoContext === "function" ? getRecentPseudoContext(session, text) : [];
      const focus = _getRecentScheduleFocus(session);
      const hasScheduleIntent = _hasPersonalScheduleIntent(text) || _isScheduleEllipsisIntent(text, focus);
      const localCommand = _parseScheduleCommandLocal(text, focus);
      const explicitTarget = _detectScheduleTarget(text);
      let command = localCommand;
      if (hasScheduleIntent) {
        const modelCommand = await _parseScheduleCommandByModel(text, pseudoContext);
        if (modelCommand && modelCommand.handled && modelCommand.confidence >= 0.55) {
          const localHasFocusedTarget = !!(localCommand && localCommand.confidence >= 0.85 && (localCommand.matchName || (localCommand.item && localCommand.item.name)));
          command = {
            ...(localCommand || {}),
            ...modelCommand,
            action: modelCommand.action || (localCommand && localCommand.action) || "open",
            target: explicitTarget || (localHasFocusedTarget && !modelCommand.matchName ? localCommand.target : modelCommand.target || (localCommand && localCommand.target) || "activity"),
            item: { ...((localCommand && localCommand.item) || {}), ...(modelCommand.item || {}) },
            matchName: modelCommand.matchName || (localCommand && localCommand.matchName) || "",
            rawText: text,
          };
        }
      }
      if (!command || !command.handled) return false;
      return _applyScheduleCommand(command, session);
    }

    function _scheduleLang() {
      const en = isEnglishUi();
      return {
        en,
        title: en ? "Personal Schedule" : "个人日程",
        hint: en
          ? "Left lane: your classes. Right lane: this week's campus activities (tap a card to flip and read the summary)."
          : "左侧列是个人课表，右侧列是本周校园活动（点击活动卡片可翻转查看简介）。",
        time: en ? "Time" : "时间",
        classLane: en ? "Class" : "课表",
        activityLane: en ? "Activity" : "活动",
        tableTitle: en ? "Campus Activity Log (Sample)" : "校园活动记录表（示例）",
        tableCols: en ? ["Name", "Brief Intro", "Time", "Weekday"] : ["名称", "简短介绍", "时间", "周几"],
        days: en
          ? { mon: "MON", tue: "TUE", wed: "WED", thu: "THU", fri: "FRI", sat: "SAT", sun: "SUN" }
          : { mon: "周一", tue: "周二", wed: "周三", thu: "周四", fri: "周五", sat: "周六", sun: "周日" },
      };
    }

    function _toMinutes(hm) {
      const m = String(hm || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!m) return 0;
      return Number(m[1]) * 60 + Number(m[2]);
    }

    function _eventWeekdayLabel(day, langObj) {
      return (langObj.days && langObj.days[day]) || day;
    }

    function _isWithinScheduleRange(startHm, endHm, rangeStartMin, rangeEndMin) {
      const s = _toMinutes(startHm);
      const e = _toMinutes(endHm);
      if (!s || !e) return false;
      if (e <= s) return false;
      return s >= rangeStartMin && e <= rangeEndMin;
    }

    function renderPersonalSchedulePage() {
      const L = _scheduleLang();
      const startMin = 9 * 60;
      const endMin = 19 * 60;
      const pxPerHour = 40;
      const pxPerMinute = pxPerHour / 60;
      const totalPx = Math.round((endMin - startMin) * pxPerMinute);
      const timeLabels = [];
      for (let m = startMin; m <= endMin; m += 60) {
        const hh = String(Math.floor(m / 60)).padStart(2, "0");
        const mm = String(m % 60).padStart(2, "0");
        const top = Math.round((m - startMin) * pxPerMinute + 3);
        timeLabels.push({ text: `${hh}:${mm}`, top });
      }

      const byDayCourses = Object.fromEntries(SCHEDULE_DAY_KEYS.map((d) => [d, []]));
      scheduleCourseItems.forEach((x) => {
        if (!_isWithinScheduleRange(x.start, x.end, startMin, endMin)) return;
        if (byDayCourses[x.day]) byDayCourses[x.day].push(x);
      });

      const byDayActs = Object.fromEntries(SCHEDULE_DAY_KEYS.map((d) => [d, []]));
      scheduleActivityItems.forEach((x) => {
        const [st, ed] = String(x.time || "").split("-");
        if (!_isWithinScheduleRange(st, ed, startMin, endMin)) return;
        if (byDayActs[x.day]) byDayActs[x.day].push(x);
      });

      const headColsHtml = SCHEDULE_DAY_KEYS.map((day) => {
        return `
          <div class="schedule-day-head">
            <div class="schedule-head-day">
              <div>${L.days[day]}</div>
              <div class="schedule-head-lanes">
                <span>${L.classLane}</span>
                <span>${L.activityLane}</span>
              </div>
            </div>
          </div>
        `;
      }).join("");

      const bodyColsHtml = SCHEDULE_DAY_KEYS.map((day) => {
        const courseHtml = byDayCourses[day]
          .map((it) => {
            const top = Math.max(0, Math.round((_toMinutes(it.start) - startMin) * pxPerMinute));
            const height = Math.max(28, Math.round((_toMinutes(it.end) - _toMinutes(it.start)) * pxPerMinute));
            const nm = String(it.name || "").toLowerCase();
            const colorClass = /lec/.test(nm) ? "course-lec" : /lab|prac/.test(nm) ? "course-lab" : "course-lab";
            const motionClass = _scheduleMotionClass("course", it);
            const itemKey = _scheduleItemMotionKey("course", it);
            return `
              <div class="schedule-item course ${colorClass} ${motionClass}" data-schedule-kind="course" data-schedule-key="${_escapeHtml(itemKey)}" style="left:4px;width:calc(58% - 8px);top:${top}px;height:${height}px;">
                <div class="schedule-item-title">${_escapeHtml(it.name)}</div>
                <div class="schedule-item-sub">${_escapeHtml(it.teacher || "")}</div>
                <div class="schedule-item-sub">${_escapeHtml(it.location || "")}</div>
                <div class="schedule-item-sub">${_escapeHtml(it.start)} - ${_escapeHtml(it.end)}</div>
              </div>
            `;
          })
          .join("");

        const actHtml = byDayActs[day]
          .map((it, idx) => {
            const [st, ed] = String(it.time || "").split("-");
            const top = Math.max(0, Math.round((_toMinutes(st || "09:00") - startMin) * pxPerMinute));
            const height = Math.max(28, Math.round((_toMinutes(ed || "10:00") - _toMinutes(st || "09:00")) * pxPerMinute));
            const aid = `${day}-${idx}`;
            return `
              <div class="schedule-item activity" data-flip-activity="${aid}" style="left:calc(58% + 4px);width:calc(42% - 8px);top:${top}px;height:${height}px;">
                <div class="activity-flip">
                  <div class="activity-face front">
                    <div class="schedule-item-title">${_escapeHtml(it.name)}</div>
                    <div class="schedule-item-sub">${_escapeHtml(it.time)}</div>
                  </div>
                  <div class="activity-face back">
                    <div class="schedule-item-title">${_escapeHtml(it.name)}</div>
                    <div class="schedule-item-sub">${_escapeHtml(it.intro)}</div>
                  </div>
                </div>
              </div>
            `;
          })
          .join("");

        return `
          <div class="schedule-day-col">
            <div class="schedule-lane-divider"></div>
            ${courseHtml}
            ${actHtml}
          </div>
        `;
      }).join("");

      const timeBodyHtml = `
        <div class="schedule-time-body schedule-time-col">
          ${timeLabels.map((x) => `<div class="schedule-time-label" style="top:${x.top}px;">${x.text}</div>`).join("")}
        </div>
      `;

      const weekdayActivities = scheduleActivityItems.filter((x) => {
        if (!SCHEDULE_DAY_KEYS.includes(String(x.day || "").toLowerCase())) return false;
        const [st, ed] = String(x.time || "").split("-");
        return _isWithinScheduleRange(st, ed, startMin, endMin);
      });
      const tableRows = weekdayActivities.map((x) => {
        const weekday = _eventWeekdayLabel(x.day, L);
        return `
          <tr>
            <td>${_escapeHtml(x.name)}</td>
            <td>${_escapeHtml(x.intro)}</td>
            <td>${_escapeHtml(x.time)}</td>
            <td>${_escapeHtml(weekday)}</td>
          </tr>
        `;
      }).join("");

      const bodyHtml = `
        <div class="schedule-wrap">
          <div class="schedule-board" style="--schedule-height:${totalPx}px;">
            <div class="schedule-head-row">
              <div class="schedule-time-head">${L.time}</div>
