<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>本地 LLM 聊天</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f9fafb);
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 32px 0;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);
      padding: 0 24px;
    }

    .header {
      padding: 8px 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
    }

    .header-subtitle {
      font-size: 12px;
      color: #6b7280;
    }

    .chat-container {
      flex: 1;
      margin-top: 12px;
      padding: 20px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 10px 15px -10px rgba(15, 23, 42, 0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      margin-bottom: 12px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message-row.user .message-bubble {
      background: #2563eb;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .message-row.assistant .message-bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    .input-area {
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.4;
      outline: none;
      max-height: 120px;
      min-height: 44px;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.2);
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 0 18px;
      height: 40px;
      background: #2563eb;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    button:not(:disabled):hover {
      background: #1d4ed8;
    }

    .status {
      font-size: 12px;
      color: #6b7280;
      margin-left: 4px;
    }

    @media (max-width: 640px) {
      .app {
        padding: 0 8px;
      }

      .chat-container {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <div class="header-title">XJTLU学习生活助理</div>
      </div>
      <div class="status" id="status">就绪</div>
    </header>

    <main class="chat-container">
      <div id="messages" class="messages"></div>

      <div class="input-area">
        <textarea
          id="input"
          rows="1"
          placeholder="向模型提问吧，比如：帮我写一段 SQL 查询..."
        ></textarea>
        <button id="send">发送</button>
      </div>
    </main>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const statusEl = document.getElementById("status");

    function appendMessage(role, text) {
      const row = document.createElement("div");
      row.className = "message-row " + role;

      const bubble = document.createElement("div");
      bubble.className = "message-bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      appendMessage("user", text);
      inputEl.value = "";
      inputEl.style.height = "44px";

      sendBtn.disabled = true;
      statusEl.textContent = "模型思考中...";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        appendMessage("assistant", data.reply || "(空回复)");
      } catch (err) {
        console.error(err);
        appendMessage("assistant", "请求失败：" + err.message);
      } finally {
        sendBtn.disabled = false;
        statusEl.textContent = "就绪";
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // 初始问候语：大学生活助手
    window.addEventListener("DOMContentLoaded", () => {
      const greeting = "你好，我是你的大学学习与生活助手，可以帮你查资料、写作业思路、规划时间等，有什么想问的？";
      appendMessage("assistant", greeting);
    });
  </script>
</body>
</html>
