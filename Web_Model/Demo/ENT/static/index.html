<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>本地 LLM 聊天</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f9fafb);
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 32px 0;
      padding-left: 0;
      padding-right: 0;
      transition: padding-left 0.2s ease, padding-right 0.2s ease;
    }

    /* 桌面端：侧边栏收起时给左侧按钮预留空白边 */
    @media (min-width: 901px) {
      body {
        padding-left: 46px;
      }
      body.sidebar-open {
        padding-left: 324px;
      }
    }

    body.sidebar-open {
      padding-left: 320px;
    }

    .app {
      width: 100%;
      max-width: 1400px; /* 让对话白框更贴近两侧边栏 */
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);
      padding: 0 14px; /* 减少左右留白 */
    }

    .header {
      padding: 8px 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      cursor: pointer;
      display: none; /* 桌面端不显示，通过侧边栏右上角按钮控制展开/收起 */
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, border-color 0.15s ease;
      flex: 0 0 auto;
    }

    .menu-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .hamburger {
      width: 16px;
      height: 12px;
      position: relative;
    }

    .hamburger span {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #111827;
      border-radius: 2px;
    }

    .hamburger span:nth-child(1) { top: 0; }
    .hamburger span:nth-child(2) { top: 5px; }
    .hamburger span:nth-child(3) { top: 10px; }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-subtitle {
      font-size: 12px;
      color: #6b7280;
    }

    .chat-container {
      flex: 1;
      margin-top: 8px;
      padding: 12px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 10px 15px -10px rgba(15, 23, 42, 0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* 空白态（ChatGPT 风格）：问候语 + 短输入框居中展示 */
    .chat-container.chat-empty {
      justify-content: center;
      padding: 26px 18px 22px;
    }

    .chat-container.chat-empty .messages {
      display: none;
    }

    .chat-container.chat-empty .empty-prompt {
      position: static;
      display: flex;
      bottom: auto;
      pointer-events: none;
      padding: 0 0 14px;
    }

    .chat-container.chat-empty .input-area {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
      justify-content: center;
    }

    .chat-container.chat-empty .input-area textarea {
      flex: 0 1 auto;
      width: min(560px, 92%); /* 约缩短到原来的 2/3 */
      min-width: 260px;
    }

    .empty-prompt {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 80px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      text-align: center;
      padding: 24px 16px;
      gap: 10px;
      pointer-events: none; /* 防止遮挡输入区域交互 */
    }

    .empty-prompt-title {
      font-size: 20px;
      color: #111827;
      font-weight: 650;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      margin-bottom: 8px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-body {
      max-width: 100%;
      display: flex;
      flex-direction: column;
    }

    .message-row.user .message-body {
      align-items: flex-end;
    }

    .message-row.assistant .message-body {
      align-items: flex-start;
    }

    .assistant-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .assistant-mini-btn {
      height: 26px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: #111827;
      font-size: 12px;
      font-weight: 700;
      width: 28px;
      padding: 0;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      user-select: none;
    }

    .assistant-mini-btn svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .assistant-mini-btn.copied {
      color: #16a34a;
      border-color: #86efac;
      background: #f0fdf4;
    }

    .assistant-mini-btn:hover {
      background: #f9fafb;
      border-color: #c7d2fe;
    }

    .assistant-mini-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message-bubble {
      /* 让气泡“内容宽度自适应”，只在超过最大宽度时才自动换行 */
      display: inline-block;
      max-width: 560px;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      /* 英文换行：不在单词中间强行拆开（需要完整词语/空格才能换行） */
      word-break: normal;
      overflow-wrap: normal;
    }

    .message-row.user .message-bubble {
      background: #2563eb;
      color: #ffffff;
      border-bottom-right-radius: 4px;
      /* 用户消息不需要保留换行语义，避免短文本在窄宽度下被拆成多行/竖排 */
      white-space: normal;
    }

    .message-row.assistant .message-bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    @media (max-width: 900px) {
      .message-bubble {
        max-width: 100%;
      }
    }

    .input-area {
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      min-width: 0;
      max-width: 580px; /* 约缩短到原来的 2/3 */
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    /* 左右边栏都展开时：中间区域更窄，输入框也跟随收一点 */
    body.sidebar-open.right-expanded .input-area {
      max-width: 520px;
    }

    textarea {
      flex: 1 0 auto;
      min-width: 200px;
      resize: none;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      padding: 8px 12px;
      font-size: 14px;
      line-height: 1.4;
      outline: none;
      max-height: 110px;
      min-height: 40px;
      /* 禁用自动换行：短输入时避免“两个字就换行”（保持单行，宽度不够就横向滚动） */
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
      overflow-x: auto;
    }

    #send {
      flex: 0 0 auto;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.2);
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 0 18px;
      height: 38px;
      background: #2563eb;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    button:not(:disabled):hover {
      background: #1d4ed8;
    }

    .status {
      font-size: 12px;
      color: #6b7280;
      margin-left: 4px;
    }

    @media (max-width: 640px) {
      .app {
        padding: 0 8px;
      }

      .chat-container {
        padding: 10px;
      }
    }

    /* Right Sidebar (new): 模块服务 */
    .right-sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      height: 100vh;
      background: #ffffff;
      border-left: 2px solid #d1d5db;
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.04);
      z-index: 60;
      display: flex;
      flex-direction: column;
      padding: 18px;
      overflow: hidden; /* 顶部按钮不滚动，滚动交给下方区域 */
      transition: width 0.22s ease;
      /* 本身为 fixed，可作为绝对定位子元素参考 */
    }

    .right-sidebar.expanded {
      width: 864px; /* 360 * 2.4 */
      padding-top: 60px; /* 给左上角返回按钮留出空间，避免遮挡内容 */
    }

    .right-sidebar-title {
      font-weight: 700;
      font-size: 15px;
      color: #111827;
      margin-bottom: 12px;
      padding: 2px 2px;
    }

    .right-sidebar-card {
      /* 收缩态：按钮不需要再套一层“卡片框” */
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1 1 auto;
      overflow: hidden; /* 只允许下方动态区域滚动 */
    }

    .right-module-content {
      display: none;
      flex: 0 0 auto; /* 让下方 AI 区域有稳定空间 */
      margin-top: 12px;
      border-radius: 16px;
      min-height: 220px;
      background: transparent;
      overflow: auto;
      max-height: 54vh; /* 避免把 AI 区域挤到看不见 */
    }

    /* Right module page (expanded content) */
    .module-page {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 10px 25px -18px rgba(15, 23, 42, 0.35);
      padding: 14px;
    }

    .module-page-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .module-page-title {
      font-weight: 900;
      font-size: 14px;
      color: #111827;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .module-inline-back {
      border: 1px solid #e5e7eb;
      background: #ffffff;
      border-radius: 12px;
      width: 38px;
      height: 34px;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: #111827; /* 确保返回图标不会变成白色 */
    }

    .module-inline-back:hover {
      background: #f9fafb;
      border-color: #c7d2fe;
    }

    .module-inline-back svg {
      width: 16px;
      height: 16px;
      display: block;
      color: currentColor;
    }

    .module-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 1100px) {
      .right-sidebar.expanded .module-grid {
        grid-template-columns: 1fr;
      }
    }

    .module-action-btn {
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 56px;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.06s ease;
    }

    .module-action-btn:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }

    .module-action-btn:active {
      transform: translateY(1px);
    }

    .module-action-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: #1d4ed8;
    }

    .module-action-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .module-action-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .module-action-title {
      font-weight: 900;
      font-size: 13px;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .module-action-sub {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .module-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f1f5f9;
    }

    .module-paragraph {
      font-size: 13px;
      color: #111827;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .module-list {
      margin: 0;
      padding-left: 18px;
      color: #111827;
      font-size: 13px;
      line-height: 1.6;
    }

    .right-back-btn {
      display: none;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      border-radius: 12px;
      padding: 0;
      cursor: pointer;
      color: #111827;
      transition: background 0.15s ease, border-color 0.15s ease;
      align-items: center;
      justify-content: center;
      user-select: none;
      width: 42px;
      height: 36px;
    }

    .right-back-btn:hover {
      background: #f9fafb;
      border-color: #c7d2fe;
    }

    .right-sidebar.expanded .right-back-btn {
      display: flex;
      position: absolute;
      top: 12px;
      left: 12px;
    }

    /* 右侧展开态：左上角显示“模块名”（例如：学习帮助） */
    .right-sidebar.expanded .right-sidebar-title {
      display: block;
      position: absolute;
      top: 18px;
      left: 62px; /* 给左侧按钮留空间 */
      margin: 0;
      padding: 0;
    }

    .right-sidebar.expanded .right-sidebar-card {
      display: none; /* 展开后进入“页面式内容”，不固定显示主模块按钮区 */
    }

    .right-sidebar.expanded .right-module-content {
      display: block;
    }

    .right-back-btn svg {
      width: 16px;
      height: 16px;
      display: block;
      color: #111827;
    }

    .right-module-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0;
      flex: 0 0 auto;
    }

    /* 右侧栏（未展开时）模块按钮下方的“动态模块”承载区 */
    .right-dynamic-modules {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1 1 auto;
      overflow-y: auto; /* 只有这里可滚动 */
      padding-right: 4px;
      padding-bottom: 6px;
    }

    /* 仅在展开态显示下方 AI 区域（列表/详情切换都在这里） */
    .right-sidebar:not(.expanded) .right-dynamic-modules {
      display: none;
    }

    .right-sidebar.expanded .right-dynamic-modules {
      display: flex;
      flex: 1 1 auto;
      overflow-y: auto;
    }

    .right-dynamic-card {
      width: 100%;
      max-width: 100%;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      padding: 16px 16px;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 10px 20px -20px rgba(15, 23, 42, 0.35);
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.06s ease;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: nowrap;
      min-width: 0;
      overflow: hidden; /* 防止图标/文字挤出卡片 */
      min-height: 64px; /* 上下更丰富 */
    }

    .right-dynamic-card:hover {
      background: #f8fafc;
      border-color: #c7d2fe;
    }

    .right-dynamic-card:active {
      transform: translateY(1px);
    }

    .right-dynamic-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: #1d4ed8;
    }

    .right-dynamic-card-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .right-dynamic-card-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .right-dynamic-card-title {
      font-weight: 900;
      font-size: 13px;
      color: #111827;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      word-break: break-word;
    }

    .right-dynamic-card-desc {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 让卡片比右侧栏稍窄一点，形成“留边”观感 */
    .right-dynamic-modules .right-dynamic-card {
      width: calc(100% - 10px);
      margin: 0 auto;
    }

    /* 展开态：在模块页面下方展示动态卡片 */
    .module-dynamic-wrap {
      margin-top: 12px;
    }

    .right-dynamic-loading {
      width: calc(100% - 10px);
      margin: 0 auto;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #6b7280;
      font-size: 12px;
    }

    .ai-detail {
      width: calc(100% - 10px);
      margin: 0 auto;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      padding: 14px;
      overflow: hidden;
    }

    .ai-detail-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .ai-detail-head {
      min-width: 0;
      flex: 1 1 auto;
    }

    .ai-detail-title {
      font-weight: 950;
      font-size: 17px;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ai-detail-desc {
      margin-top: 6px;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.6;
    }

    .ai-detail-text {
      margin-top: 10px;
      font-size: 14px;
      color: #111827;
      line-height: 1.75;
    }

    .ai-detail-list {
      margin: 10px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: #111827;
      line-height: 1.75;
    }

    .ai-detail-olist {
      margin: 10px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: #111827;
      line-height: 1.75;
    }

    .right-dynamic-spinner {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid rgba(37, 99, 235, 0.18);
      border-top-color: #2563eb; /* 常见“圆环旋转”加载图标 */
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .chat-loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .chat-loading-spinner {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(107, 114, 128, 0.25);
      border-top-color: #6b7280;
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    .chat-loading-dots::after {
      content: "";
      display: inline-block;
      width: 18px;
      text-align: left;
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
      100% { content: ""; }
    }

    .right-module-btn {
      width: 100%;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      padding: 16px 16px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      color: #111827;
      font-weight: 750;
      transition: background 0.15s ease, border-color 0.15s ease;

    function _escapeHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function _escapeAndLinkify(text) {
      const s = String(text || "");
      const re = /\bhttps?:\/\/[^\s<>"']+/gi;
      let out = "";
      let last = 0;
      let m = null;
      while ((m = re.exec(s))) {
        const url = String(m[0] || "");
        out += _escapeHtml(s.slice(last, m.index));
        const safeHref = url.replace(/[\u0000-\u001F\u007F]/g, "");
        out += `<a href="${_escapeHtml(safeHref)}" target="_blank" rel="noopener noreferrer">${_escapeHtml(url)}</a>`;
        last = m.index + url.length;
      }
      out += _escapeHtml(s.slice(last));
      return out;
    }

    function toDeclarativeTitle(rawTitle) {
      let s = String(rawTitle || "").trim();
      if (!s) return "推荐内容";
      s = s.replace(/[？?]+$/g, "").trim();
      s = s.replace(/^请问[:：]?\s*/g, "");
      // 常见“疑问字段”直接映射为陈述句字段标题（避免看起来像问句）
      if (/(几号|什么时候|何时|时间|日期|几点).*(开学)/.test(s) || /(开学).*(几号|什么时候|何时|时间|日期|几点)/.test(s)) {
        return "学校开学时间";
      }
      if (/(几号|什么时候|何时|时间|日期|几点).*(报到)/.test(s) || /(报到).*(几号|什么时候|何时|时间|日期|几点)/.test(s)) {
        return "新生报到时间";
      }
      if (/(截止|ddl|截至).*(什么时候|何时|时间|日期|几点)/i.test(s) || /(什么时候|何时|时间|日期|几点).*(截止|ddl|截至)/i.test(s)) {
        return "申请截止时间";
      }
      if (/(在哪|哪里|地点|地址|位置)/.test(s)) {
        // 不强行猜具体事项，给出字段型标题
        return "相关办理地点";
      }
      if (/(多少钱|费用|收费|价格)/.test(s)) {
        return "相关费用信息";
      }
      if (/(电话|联系方式|邮箱|联系)/.test(s)) {
        return "相关联系方式";
      }
      if (/(入口|链接|官网|网站|平台|系统)/.test(s)) {
        return "相关办理入口";
      }
      const lead = ["如何", "怎么", "怎样", "是否", "能否", "可以", "有没有", "是不是"];
      for (const p of lead) {
        if (s.startsWith(p)) {
          s = s.slice(p.length).trim();
          break;
        }
      }
      // 只做“去问号 + 去疑问开头”的最小清洗；标题质量由后端提示词改写来保证
      // 去掉尾部语气词（让标题更像陈述句）
      s = s.replace(/(吗|呢|呀|嘛)\s*$/g, "").trim();
      // 去掉开头“几号/什么时候/何时”等疑问字段词（避免标题看起来像问句）
      s = s.replace(/^(几号|什么时候|何时|几点|多少|多少钱)\s*/g, "").trim();
      // 不做字数硬限制：标题应尽量语义完整
      if (s.length < 6 && rawTitle) {
        // 太短时回退原文去问号
        const t = String(rawTitle).replace(/[？?]+$/g, "").trim();
        if (t) s = t;
      }
      return s;
    }

    function renderDynamicCardsHtml(list, contextKey) {
      const safeKey = _escapeHtml(contextKey || "");
      if (!list || list.length === 0) return "";
      return list
        .map((m, idx) => {
          const rawTitle = m && m.allowRawTitle ? String(m.title || "推荐模块") : toDeclarativeTitle(m.title || "推荐模块");
          const title = _escapeHtml(rawTitle);
          const desc = _escapeHtml(m.desc || "");
          const icon = svgIcon(m.icon || "book");
          const action = _escapeHtml(m.action || "");
          const details = _escapeHtml(m.details || "");
          return `
            <button class="right-dynamic-card" type="button"
              data-dyn-context="${safeKey}"
              data-dyn-index="${idx}"
              data-dyn-action="${action}"
              data-dyn-title="${title}"
              data-dyn-desc="${desc}"
              data-dyn-icon="${_escapeHtml(m.icon || "book")}"
              data-dyn-details="${details}">
              <div class="right-dynamic-card-icon" aria-hidden="true">${icon}</div>
              <div class="right-dynamic-card-body">
                <div class="right-dynamic-card-title">${title}</div>
                <div class="right-dynamic-card-desc">${desc}</div>
              </div>
            </button>
          `;
        })
        .join("");
    }

    function renderDynamicModulesForKey(moduleKey) {
      if (!rightDynamicModulesEl) return;
      const key = String(moduleKey || "");
      if (!key) return; // key 为空时不改动 UI，避免“误清空”
      // 详情页展开时：只更新缓存，不重绘 UI，避免当前详情被刷回列表
      if (dynamicViewMode === "detail") return;
      const list = getDynamicListForKey(key);
      if (!list || list.length === 0) {
        // 如果还在请求中，用加载动画提示用户（避免误以为卡死/没内容）
        if (key && dynamicLoadingByKey && dynamicLoadingByKey[key]) {
          renderDynamicLoading(key);
          return;
        }
        // 进入子模块时如果该子模块暂无推荐内容：不要把原有列表清空，保持不消失
        return;
      }
      // 列表文案需要先经过改写：没改写完成前先显示加载，避免先出现“疑问句标题”
      if (!list.__rewritten) {
        ensureRewriteDynamicListForKey(key, list);
        if (dynamicRewriteLoadingByKey && dynamicRewriteLoadingByKey[key]) {
          renderDynamicLoading(key); // 共用旋转 loading
          return;
        }
      }
      rightDynamicModulesEl.innerHTML = renderDynamicCardsHtml(getDynamicListForKey(key), key);
    }

    function ensureRewriteDynamicListForKey(key, list) {
      const k = String(key || "");
      if (!k || !Array.isArray(list) || list.length === 0) return;
      if (dynamicRewriteLoadingByKey[k]) return;
      if (list && list.__rewritten) return;

      // 聊天回复优先：流式输出期间不触发列表改写请求（只排队）
      if (isChatStreaming) {
        pendingListRewriteKeys.add(k);
        return;
      }

      // cache hit (short TTL)
      const cached = dynamicRewriteCacheByKey && dynamicRewriteCacheByKey[k];
      if (cached && cached.list && Date.now() - (cached.ts || 0) < DYNAMIC_REWRITE_TTL_MS) {
        const rewritten = cached.list;
        rewritten.__rewritten = true;
        dynamicModulesPrefetch[k] = rewritten;
        dynamicModulesByKey[k] = rewritten;
        if (dynamicViewMode !== "detail" && rightDynamicModulesEl && (activeDynamicKey === k || lastClickedModuleKey === k)) {
          rightDynamicModulesEl.innerHTML = renderDynamicCardsHtml(rewritten, k);
        }
        return;
      }

      dynamicRewriteLoadingByKey[k] = true;
      (async () => {
        try {
          const payload = list.slice(0, 12).map((c) => ({
            q: c.action || c.title || "",
            a: c.details || "",
            icon: c.icon || "book",
          }));
          const res = await fetch("/api/rewrite_dynamic_list", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contextKey: k, items: payload }),
          });
          if (!res.ok) return;
          const data = await res.json();
          const out = data && Array.isArray(data.items) ? data.items : null;
          if (!out) return;
          const rewritten = list.map((c, idx) => {
            if (idx >= out.length) return c;
            const r = out[idx] || {};
            return { ...c, title: r.title || c.title, desc: r.desc || c.desc, icon: r.icon || c.icon };
          });
          rewritten.__rewritten = true;
          dynamicRewriteCacheByKey[k] = { ts: Date.now(), list: rewritten };
          dynamicModulesPrefetch[k] = rewritten;
          dynamicModulesByKey[k] = rewritten;
          if (dynamicViewMode !== "detail" && rightDynamicModulesEl && (activeDynamicKey === k || lastClickedModuleKey === k)) {
            rightDynamicModulesEl.innerHTML = renderDynamicCardsHtml(rewritten, k);
          }
        } catch (e) {
          // 改写失败：标记为已完成，允许回退渲染（避免一直转圈）
          try {
            const fallback = Array.isArray(list) ? list.slice() : [];
            fallback.__rewritten = true;
            dynamicModulesPrefetch[k] = fallback;
            dynamicModulesByKey[k] = fallback;
            if (dynamicViewMode !== "detail" && rightDynamicModulesEl && (activeDynamicKey === k || lastClickedModuleKey === k)) {
              rightDynamicModulesEl.innerHTML = renderDynamicCardsHtml(fallback, k);
            }
          } catch (e2) {}
        } finally {
          dynamicRewriteLoadingByKey[k] = false;
        }
      })();
    }

    function flushPendingAfterChat() {
      // flush list rewrites
      try {
        const keys = Array.from(pendingListRewriteKeys || []);
        pendingListRewriteKeys = new Set();
        keys.forEach((k) => {
          const list = getDynamicListForKey(k);
          if (list && list.length) ensureRewriteDynamicListForKey(k, list);
        });
      } catch (e) {}

      // flush detail rewrites (only last one)
      try {
        const last = pendingDetailCards && pendingDetailCards.length ? pendingDetailCards[pendingDetailCards.length - 1] : null;
        pendingDetailCards = [];
        if (last) openDynamicCardDetails(last);
      } catch (e) {}
    }

    function renderDynamicLoading(moduleKey) {
      if (!rightDynamicModulesEl) return;
      if (!moduleKey) return;
      rightDynamicModulesEl.innerHTML = `
        <div class="right-dynamic-loading" role="status" aria-live="polite">
          <div class="right-dynamic-spinner" aria-hidden="true"></div>
          <div>正在加载推荐内容…</div>

    }

    async function prefetchQaForModule(moduleKey, queryText = "") {
      const key = String(moduleKey || "").trim();
      if (!key) return;
      const q = String(queryText || "").trim();

      try {
        // 如果同一个模块 key 的排序 query 变了：
        // - 仍然会重新请求后端拿“新排序”
        // - 但不要清空现有列表（避免右侧 AI 生成栏闪烁/丢内容）
        // - 新结果会插入到现有列表前面，再去重合并
        const prevQ = String((lastSortQueryByKey && lastSortQueryByKey[key]) || "");
        if (q && q !== prevQ) {
          lastSortQueryByKey[key] = q;
          // 关键：列表文案“改写缓存”默认只按 key 缓存（不含 queryText）。
          // 如果 query 变了但缓存仍在 TTL 内，会导致 UI 继续复用旧顺序的 rewritten list，
          // 看起来就像“无论输入什么，AI 生成栏顺序都不变”。
          // 所以：query 变化时只清理改写缓存（不清空列表内容），等新排序回来后再按新顺序改写。
          try {
            if (dynamicRewriteCacheByKey) delete dynamicRewriteCacheByKey[key];
          } catch (e) {}
          try {
            const subs = getSubmoduleKeysForModule(key) || [];
            subs.forEach((sk) => {
              try {
                if (dynamicRewriteCacheByKey) delete dynamicRewriteCacheByKey[sk];
              } catch (e2) {}
            });
          } catch (e) {}
        } else if (q && !prevQ) {
          lastSortQueryByKey[key] = q;
        }

        dynamicLoadingByKey[key] = true;
        // 如果还没有任何缓存内容，就展示加载态；有缓存则先显示缓存，避免闪烁
        const existing = (dynamicModulesByKey && dynamicModulesByKey[key]) || [];
        if (!existing || existing.length === 0) renderDynamicLoading(key);

        const res = await fetch("/api/module_qa_scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            moduleKey: key,
            submoduleKeys: getSubmoduleKeysForModule(key),
            max_cards: 8,
            queryText: q,
          }),
        });
        if (!res.ok) return;
        const data = await res.json();

        // module cards
        if (data && data.moduleKey) {
          const moduleCards = Array.isArray(data.cards) ? data.cards : [];
          const globalHits = Array.isArray(data.globalHits) ? data.globalHits : [];
          // 合并策略：
          // - 先插入本次命中的新结果（globalHits + moduleCards），保证“命中模块/命中内容”优先出现在最上面
          // - 再保留已有列表（避免其它内容突然消失）
          // - 全部去重；如果同一条 QA 同时出现在“总 QA”与“模块 QA”，永远保留总 QA
          const bestPriByKey = new Map(); // key -> { pri:number, idx:number }
          const merged = [];
          const oldList = (dynamicModulesByKey && dynamicModulesByKey[data.moduleKey]) || [];
          const cardKey = (c) => String((c && (c.action || c.title)) || "");
          const add = (c, pri) => {
            const k = cardKey(c);
            if (!k) return;
            const cur = bestPriByKey.get(k);
            if (!cur) {
              bestPriByKey.set(k, { pri, idx: merged.length });
              merged.push(c);
              return;
            }
            // lower pri wins: 0=globalHits, 1=moduleCards, 2=oldList
            if (pri < cur.pri) {
              merged[cur.idx] = c; // replace in-place so ordering stays stable
              bestPriByKey.set(k, { pri, idx: cur.idx });
            }
          };
          globalHits.forEach((c) => add(c, 0));
          moduleCards.forEach((c) => add(c, 1));
          oldList.forEach((c) => add(c, 2));
          dynamicModulesByKey[data.moduleKey] = merged;
          dynamicModulesPrefetch[data.moduleKey] = merged;
          // 重新排序后，标记为“未改写”，保证改写按新顺序再跑一遍
          if (dynamicModulesByKey[data.moduleKey]) dynamicModulesByKey[data.moduleKey].__rewritten = false;
          if (dynamicModulesPrefetch[data.moduleKey]) dynamicModulesPrefetch[data.moduleKey].__rewritten = false;
        }

        // submodule cards
        if (data && data.submodules && typeof data.submodules === "object") {
          Object.keys(data.submodules).forEach((subKey) => {
            const list = data.submodules[subKey];
            dynamicModulesPrefetch[subKey] = Array.isArray(list) ? list : [];
            if (dynamicModulesPrefetch[subKey]) dynamicModulesPrefetch[subKey].__rewritten = false;
          });
        }

        // 立即刷新当前大模块承载区
        renderDynamicModulesForKey(key);
        // 如果用户此时正处于该模块页面（已展开），也要立即刷新一次右侧内容，避免“要进子模块再退回才出现”
        if (dynamicViewMode !== "detail" && document.body.classList.contains("right-expanded") && rightModuleKey === key) {
          renderRightModule();
          // 同步刷新顶部下方的动态列表
          renderDynamicModulesForKey(key);
        }
      } catch (e) {
        // 静默失败：不影响展开侧边栏
      } finally {
        dynamicLoadingByKey[key] = false;
      }
    }

    // 提供一个“接口”：后续大模型/后端命中 QA 时，直接调用这个函数即可在按钮栏下方生成卡片
    // modules: [{ title, desc, icon, action, details }]
    window.setRightDynamicModules = function setRightDynamicModules(moduleKey, modules) {
      const key = String(moduleKey || "");
      if (!dynamicModulesByKey[key]) dynamicModulesByKey[key] = [];
      dynamicModulesByKey[key] = Array.isArray(modules) ? modules : [];
      renderDynamicModulesForKey(key);
    };

    function getDynamicListForKey(k) {
      const key = String(k || "");
      if (!key) return [];
      if (dynamicModulesPrefetch && Array.isArray(dynamicModulesPrefetch[key])) return dynamicModulesPrefetch[key];
      if (dynamicModulesByKey && Array.isArray(dynamicModulesByKey[key])) return dynamicModulesByKey[key];
      return [];
    }

    function getBestDynamicKey() {
      const preferred = String(activeDynamicKey || "");
      if (preferred) {
        const list = getDynamicListForKey(preferred);
        if (list && list.length > 0) return preferred;
        if (
          (dynamicLoadingByKey && dynamicLoadingByKey[preferred]) ||
          (dynamicRewriteLoadingByKey && dynamicRewriteLoadingByKey[preferred])
        ) {
          return preferred;
        }
      }
      return String(lastClickedModuleKey || rightModuleKey || "");
    }

    function renderDynamicModulesForActiveKey() {
      // 展开态：显示“当前子模块/页面”对应的动态卡片
      const key = String(activeDynamicKey || "");
      const list = getDynamicListForKey(key);
      if (!list || list.length === 0) return "";
      // 详情/列表已经在右侧栏下方 AI 区域渲染，这里不再往页面内容里插入第二份，避免“上面也有一块动态卡片”
      return "";
    }

    function openDynamicCardDetails(card) {
      if (!card) return;
      // 确保右侧栏展开
      if (!document.body.classList.contains("right-expanded")) {
        expandRightSidebarAndCollapseLeft(lastClickedModuleKey || "study");
      }
      dynamicViewMode = "detail";
      activeDynamicCard = card;
      // 点击卡片后才开始“AI 生成/改写”：先显示加载，再请求后端改写接口
      if (rightDynamicModulesEl) {
        const ctxKey = String(activeDynamicKey || lastClickedModuleKey || "");
        const qKey = String(card.action || card.title || "").trim();
        const aKey = String(card.details || "").trim();
        const detailKey = `${ctxKey}||${qKey}||${aKey.slice(0, 120)}`;

        // short cache: repeated opens don't re-generate
        const cached = dynamicDetailCacheByKey && dynamicDetailCacheByKey[detailKey];
        if (cached && cached.data && Date.now() - (cached.ts || 0) < DYNAMIC_REWRITE_TTL_MS) {
          const d = cached.data;
          const title = _escapeHtml(toDeclarativeTitle(d.title || card.title || "推荐内容"));
          const desc = _escapeHtml(d.desc || "");
          const detailsText = String(d.details || "").trim();
          const lines = detailsText
            .split(/\n+/)
            .map((x) => x.trim())
            .filter(Boolean);
          const stripLeadingNumbering = (s) =>
            String(s || "")
              .trim()
              .replace(/^\s*\d+(?:\.\d+)*\s*[\.\)、)]\s*/g, "")
              .trim();
          const detailsHtml =
            lines.length >= 2
              ? `<ol class="ai-detail-olist">${lines.map((x) => `<li>${_escapeAndLinkify(stripLeadingNumbering(x))}</li>`).join("")}</ol>`
              : `<div class="ai-detail-text">${detailsText ? _escapeAndLinkify(detailsText).replace(/\n/g, "<br>") : "（暂无详情）"}</div>`;
          rightDynamicModulesEl.innerHTML = `
            <div class="ai-detail">
              <div class="ai-detail-top">
                <button class="module-inline-back" type="button" data-dyn-view="list" aria-label="返回列表" title="返回">
                  ${svgIcon("arrow-left")}
                </button>
                <div class="ai-detail-head">
                  <div class="ai-detail-title">${title}</div>
                  ${desc ? `<div class="ai-detail-desc">${desc}</div>` : ""}
                </div>
              </div>
              ${detailsHtml}
            </div>
          `;
          return;
        }

        // 先展示“标题 + 加载态”，避免只看到空白加载框
        const preTitle = _escapeHtml(toDeclarativeTitle(card.title || card.action || "推荐内容"));
        rightDynamicModulesEl.innerHTML = `
          <div class="ai-detail">
            <div class="ai-detail-top">
              <button class="module-inline-back" type="button" data-dyn-view="list" aria-label="返回列表" title="返回">
                ${svgIcon("arrow-left")}
              </button>
              <div class="ai-detail-head">
                <div class="ai-detail-title">${preTitle}</div>
                <div class="ai-detail-desc">正在生成更详细的内容，请稍等…</div>
              </div>
            </div>
            <div class="right-dynamic-loading" style="margin-top:10px;">
              <div class="right-dynamic-spinner" aria-hidden="true"></div>
              <div>正在加载推荐内容…</div>
            </div>
          </div>
        `;
        // 聊天回复优先：流式输出期间不触发详情改写请求（只排队）
        if (isChatStreaming) {
          pendingDetailCards.push(card);
          return;
        }
        (async () => {
          try {
            const res = await fetch("/api/rewrite_dynamic_card", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contextKey: activeDynamicKey || lastClickedModuleKey || "",
                q: card.action || card.title || "",
                a: card.details || "",
                icon: card.icon || "book",
              }),
            });
            const data = res.ok ? await res.json() : null;
            const title = _escapeHtml(toDeclarativeTitle((data && data.title) || card.title || "推荐内容"));
            const desc = _escapeHtml((data && data.desc) || card.desc || "");
            const detailsText = String((data && data.details) || card.details || "").trim();

            // cache it
            if (data && (data.title || data.desc || data.details)) {
              dynamicDetailCacheByKey[detailKey] = {
                ts: Date.now(),
                data: { title: data.title || "", desc: data.desc || "", details: data.details || "", icon: data.icon || card.icon || "book" },
              };
            }

            // 解析形如 "['a','b']" 或 JSON 数组文本，渲染为要点列表
            let listItems = null;
            try {
              const maybe = detailsText.trim();
              const normalized = maybe
                .replace(/^\s*\(\s*\[/, "[")
                .replace(/\]\s*\)\s*$/, "]")
                .replace(/^'/, '"')
                .replace(/'\s*,/g, '",')
                .replace(/,\s*'/g, ',"')
                .replace(/'\s*\]/g, '"]')
                .replace(/\[\s*'/g, '["');
              const arr = JSON.parse(normalized);
              if (Array.isArray(arr)) {
                listItems = arr.map((x) => String(x || "").trim()).filter(Boolean);
              }
            } catch (e) {}

            let detailsHtml = "";
            const stripLeadingNumbering = (s) => {
              const t = String(s || "").trim();
              // 去掉开头自带序号：1. / 1、 / 1) / 1.1. / 1.2) 等
              return t.replace(/^\s*\d+(?:\.\d+)*\s*[\.\)、)]\s*/g, "").trim();
            };
            if (listItems && listItems.length) {
              detailsHtml = `<ol class="ai-detail-olist">${listItems
                .map((x) => `<li>${_escapeAndLinkify(stripLeadingNumbering(x))}</li>`)
                .join("")}</ol>`;
            } else {
              const lines = detailsText
                .split(/\n+/)
                .map((x) => x.trim())
                .filter(Boolean);
              if (lines.length >= 3) {
                detailsHtml = `<ol class="ai-detail-olist">${lines
                  .map((x) => `<li>${_escapeAndLinkify(stripLeadingNumbering(x))}</li>`)
                  .join("")}</ol>`;
              } else {
                detailsHtml = `<div class="ai-detail-text">${
                  detailsText ? _escapeAndLinkify(detailsText).replace(/\n/g, "<br>") : "（暂无详情）"
                }</div>`;
              }
            }

            rightDynamicModulesEl.innerHTML = `
              <div class="ai-detail">
                <div class="ai-detail-top">
                  <button class="module-inline-back" type="button" data-dyn-view="list" aria-label="返回列表" title="返回">
                    ${svgIcon("arrow-left")}
                  </button>
                  <div class="ai-detail-head">
                    <div class="ai-detail-title">${title}</div>
                    ${desc ? `<div class="ai-detail-desc">${desc}</div>` : ""}
                  </div>
                </div>
                ${detailsHtml}
              </div>
            `;
          } catch (e) {
            // fallback: 直接渲染原 details
            const title = _escapeHtml(toDeclarativeTitle(card.title || "推荐内容"));
            const details = String(card.details || "").trim();
            rightDynamicModulesEl.innerHTML = `
              <div class="ai-detail">
                <div class="ai-detail-top">
                  <button class="module-inline-back" type="button" data-dyn-view="list" aria-label="返回列表" title="返回">
                    ${svgIcon("arrow-left")}
                  </button>
                  <div class="ai-detail-head">
                    <div class="ai-detail-title">${title}</div>
                  </div>
                </div>
                <div class="ai-detail-text">${details ? _escapeAndLinkify(details).replace(/\n/g, "<br>") : "（暂无详情）"}</div>
              </div>
            `;
          }
        })();
      }
    }

    // 动态卡片点击：打开详情（并展开右侧栏）
    if (rightDynamicModulesEl) {
      rightDynamicModulesEl.addEventListener("click", (e) => {
        const t = e.target;
        const backBtn = t && t.closest ? t.closest("[data-dyn-view=\"list\"]") : null;
        if (backBtn) {
          // 返回 AI 列表：按当前模块 key 重新渲染
          dynamicViewMode = "list";
          renderDynamicModulesForKey(getBestDynamicKey());
          return;
        }

        const useBtn = t && t.closest ? t.closest("[data-dyn-use-action]") : null;
        if (useBtn) {
          if (activeDynamicCard && activeDynamicCard.action && inputEl) {
            inputEl.value = String(activeDynamicCard.action);
            inputEl.focus();
          }
          return;
        }

        const btn = t && t.closest ? t.closest("[data-dyn-details]") : null;
        if (!btn) return;
        const card = {
          title: btn.getAttribute("data-dyn-title") || "推荐模块",
          desc: btn.getAttribute("data-dyn-desc") || "",
          icon: btn.getAttribute("data-dyn-icon") || "book",
          action: btn.getAttribute("data-dyn-action") || "",
          details: btn.getAttribute("data-dyn-details") || "",
        };
        openDynamicCardDetails(card);
      });
    }

    const LOGIN_STORAGE_KEY = "xipu_life_assistant_user";

    // sessions：只保存“已进入历史”的会话（即用户已发出过第一句）
    let sessions = [];
    // draftSession：当前正在对话但尚未加入历史的会话（用户还没发第一句）
    let draftSession = null;
    let currentSessionId = null;

    function getCurrentSession() {
      if (draftSession && draftSession.id === currentSessionId) return draftSession;
      return sessions.find((s) => s.id === currentSessionId) || null;
    }

    function setActiveSession(sessionId) {
      currentSessionId = sessionId;
      draftSession = null; // 切到历史会话后，当前切换为已入历史的会话
      renderSidebarHistory();
      renderMessagesFromSession();
      updateEmptyPrompt();
    }

    function renderSidebarHistory() {
      if (!historyListEl) return;
      historyListEl.innerHTML = "";
      sessions.forEach((s) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "history-item" + (s.id === currentSessionId ? " active" : "");
        btn.textContent = s.title || "新对话";
        btn.addEventListener("click", () => setActiveSession(s.id));
        historyListEl.appendChild(btn);
      });
    }

    function renderMessagesFromSession() {
      const session = getCurrentSession();
      messagesEl.innerHTML = "";
      if (!session) return;

      session.messages.forEach((m, idx) => appendMessage(m.role, m.text, m.id, idx));
    }

    function createMessageId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function isMobile() {
      return window.innerWidth <= 900;
    }

    function isLeftSidebarExpanded() {
      if (!sidebarEl) return false;
      if (isMobile()) {
        return sidebarEl.classList.contains("open");
      }
      // 桌面端：sidebar-open 表示展开态（收起时会 remove）
      return document.body.classList.contains("sidebar-open") && !sidebarEl.classList.contains("collapsed");
    }

    function expandRightSidebarAndCollapseLeft(moduleKey) {
      if (!rightSidebarEl) return;
      // 右侧：扩展到 2.4 倍
      rightSidebarEl.classList.add("expanded");
      document.body.classList.add("right-expanded");

      currentModuleName = MODULE_NAME_MAP[moduleKey] || LEFT_SIDEBAR_TITLE;
      // 左侧栏标题不跟随右侧模块变化
      if (rightSidebarTitleEl) rightSidebarTitleEl.textContent = currentModuleName;
      rightModuleKey = moduleKey || "";
      setRightPageStack([
        rightModuleKey === "study"
          ? "study_home"
          : rightModuleKey === "intern"
          ? "intern_home"
          : rightModuleKey === "campus"
          ? "campus_home"
          : rightModuleKey === "life"
          ? "life_home"
          : rightModuleKey === "research"
          ? "research_home"
          : "",
      ]);
      renderRightModule();

      // 左侧：强制收缩（已收缩则保持不变）
      if (isMobile()) {
        closeSidebarMobile();
      } else {
        closeSidebarDesktop();
      }

      // 当前“内容还没填”，按你的要求展开后显示为空白即可
      if (rightModuleContentEl) {
        // 具体内容由 renderRightModule() 决定
      }

      // 右侧展开时：隐藏输入区域的空状态提示（包括“可以问我…”那句）
      updateEmptyPrompt();
    }

    function collapseRightSidebar() {
      if (!rightSidebarEl) return;
      rightSidebarEl.classList.remove("expanded");
      document.body.classList.remove("right-expanded");
      if (rightModuleContentEl) rightModuleContentEl.innerHTML = "";
      if (rightSidebarTitleEl) rightSidebarTitleEl.textContent = "板块服务";
      rightModuleKey = "";
      setRightPageStack([]);
      // 回到“未选择模块”态：不展示 AI 生成卡片（下次点击模块再生成/渲染）
      activeDynamicKey = "";
      activeDynamicCard = null;
      lastClickedModuleKey = "";
      if (rightDynamicModulesEl) rightDynamicModulesEl.innerHTML = "";
      // 收起后根据消息是否为空决定是否显示空状态提示
      updateEmptyPrompt();
    }

    function getLoginUser() {
      try {
        const raw = localStorage.getItem(LOGIN_STORAGE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (!data || !data.username) return null;
        return data;
      } catch (e) {
        return null;
      }
    }

    function renderLoginCard() {
      const user = getLoginUser();
      if (!user) {
        loginContentEl.innerHTML = `
          <div class="login-user">
            <img class="login-avatar" src="https://api.dicebear.com/7.x/initials/svg?seed=Guest" alt="guest">
            <div class="login-name">未登录</div>
          </div>
          <div class="login-action">点击登录</div>
        `;
        return;
      }

      const safeName = String(user.username).replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const avatar = user.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(user.username)}`;
      loginContentEl.innerHTML = `
        <div class="login-user">
          <img class="login-avatar" src="${avatar}" alt="avatar">
          <div class="login-name">${safeName}</div>
        </div>
        <button class="logout-btn" id="logoutBtn" type="button">退出</button>
      `;
      const logoutBtn = document.getElementById("logoutBtn");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          localStorage.removeItem(LOGIN_STORAGE_KEY);
          renderLoginCard();
        });
      }
    }

    function gotoLoginPage() {
      window.location.href = "/static/login.html?redirect=/";
    }

    function openSidebarMobile() {
      sidebarEl.classList.add("open");
      sidebarEl.classList.remove("collapsed");
      sidebarMaskEl.style.display = "block";
      updateLeftSidebarModuleLabel();
      updateEmptyPrompt();
    }

    function closeSidebarMobile() {
      sidebarEl.classList.remove("open");
      sidebarEl.classList.add("collapsed");
      sidebarMaskEl.style.display = "none";
      updateEmptyPrompt();
    }

    function openSidebarDesktop() {
      sidebarEl.classList.remove("collapsed");
      sidebarEl.classList.remove("open");
      document.body.classList.add("sidebar-open");
      sidebarMaskEl.style.display = "none";
      updateLeftSidebarModuleLabel();
      updateEmptyPrompt();
    }

    function closeSidebarDesktop() {
      sidebarEl.classList.add("collapsed");
      sidebarEl.classList.remove("open");
      document.body.classList.remove("sidebar-open");
      sidebarMaskEl.style.display = "none";
      updateEmptyPrompt();
    }

    function handleMenuClick() {
      if (isMobile()) {
        openSidebarMobile();
        return;
      }
      if (sidebarEl.classList.contains("collapsed")) {
        openSidebarDesktop();
      } else {
        closeSidebarDesktop();
      }
    }

    function handleSidebarCloseOrToggle() {
      if (isMobile()) {
        // 移动端：侧边栏作为弹窗，只做关闭
        closeSidebarMobile();
        return;
      }
      // 桌面端：点击侧边栏右上角按钮在“展开/收起”间切换
      handleMenuClick();
    }

    menuBtnEl.addEventListener("click", handleMenuClick);
    sidebarCloseEl.addEventListener("click", handleSidebarCloseOrToggle);
    sidebarMaskEl.addEventListener("click", closeSidebarMobile);
    loginCardEl.addEventListener("click", () => {
      const user = getLoginUser();
      if (!user) {
        gotoLoginPage();
        return;
      }
      window.location.href = "/static/personal_center.html";
    });
    loginCardEl.addEventListener("keydown", (e) => {
      if (e.key !== "Enter" && e.key !== " ") return;
      const user = getLoginUser();
        e.preventDefault();
      if (!user) gotoLoginPage();
      else window.location.href = "/static/personal_center.html";
    });

    function createNewSession() {
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      const session = {
        id,
        title: "新对话",
        messages: [],
        hasUserMessage: false, // 用户是否已发送过“第一句话”
      };
      currentSessionId = session.id;
      draftSession = session; // 新会话先作为草稿，不计入历史
      return session;
    }

    function startNewChat() {
      const session = createNewSession();
      // 新会话：像全新页面一样（不自动插入任何助手开场白）
      messagesEl.innerHTML = "";
      session.messages = [];
      renderSidebarHistory();
      renderMessagesFromSession();
      updateEmptyPrompt();
    }

    // Demo：新建对话 = 清空消息区域（不影响后端）
    btnNewChatEl.addEventListener("click", () => {
      startNewChat();
    });

    btnClearEl.addEventListener("click", () => {
      messagesEl.innerHTML = "";
      const session = getCurrentSession();
      if (session) {
        session.messages = [];
        session.title = "新对话";
        session.hasUserMessage = false;
      }
      // 清空后如果仍未产生“第一句用户消息”，则该会话不应出现在历史记录中
      if (session && sessions.some((s) => s.id === session.id) && !session.hasUserMessage) {
        sessions = sessions.filter((s) => s.id !== session.id);
        draftSession = session;
      }
      renderSidebarHistory();
      renderMessagesFromSession();
      updateEmptyPrompt();
    });

    // 右侧模块按钮：点击后展开右侧栏并（按你的要求）左侧强制收缩
    if (rightSidebarEl && rightModuleContentEl) {
      const rightModuleButtons = document.querySelectorAll(".right-module-btn");
      rightModuleButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const moduleKey = btn.dataset.module || "";
          lastClickedModuleKey = moduleKey || "";
          // 点击大模块时：扫描该模块 QA，并预生成“模块 + 子模块”的动态卡片缓存
          prefetchQaForModule(moduleKey);
          // 先显示已有缓存（如果还没取回也不影响 UI）
          renderDynamicModulesForKey(moduleKey);
          expandRightSidebarAndCollapseLeft(moduleKey);
        });
      });
    }

    if (rightBackBtnEl) {
      rightBackBtnEl.addEventListener("click", () => {
        collapseRightSidebar();
      });
    }

    // 右侧栏内部页面交互（学习帮助：页内跳转/返回）
    if (rightModuleContentEl) {
      rightModuleContentEl.addEventListener("click", (e) => {
        const t = e.target;
        const btn = t && t.closest ? t.closest("[data-right-page],[data-right-action]") : null;
        if (!btn) return;

        const action = btn.getAttribute("data-right-action");
        if (action === "back") {
          if (rightPageStack.length > 1) popRightPage();
          renderRightModule();
          return;
        }
        if (action === "use_action") {
          if (activeDynamicCard && activeDynamicCard.action && inputEl) {
            inputEl.value = String(activeDynamicCard.action);
            inputEl.focus();
          }
          return;
        }

        const page = btn.getAttribute("data-right-page");
        if (page) {
          pushRightPage(page);
          renderRightModule();
        }
      });
    }

    function updateEmptyPrompt() {
      const isEmpty = messagesEl.children.length === 0;
      const rightExpanded = document.body.classList.contains("right-expanded");
      const leftExpanded = isLeftSidebarExpanded();
      const bothSidebarsExpanded = !!rightExpanded && !!leftExpanded;
      const shouldHide = isEmpty && bothSidebarsExpanded;
      emptyPromptEl.style.display = isEmpty && !shouldHide ? "flex" : "none";
      if (chatContainerEl) {
        // 只有“真正空白页”才用 ChatGPT 居中输入布局；
        // 当左右边栏都展开时，新页面也按“沉底输入”的聊天布局显示
        const useEmptyLayout = !!isEmpty && !bothSidebarsExpanded;
        chatContainerEl.classList.toggle("chat-empty", useEmptyLayout);
      }
    }

    function appendMessage(role, text, messageId = null, messageIndex = null) {
      const row = document.createElement("div");
      row.className = "message-row " + role;

      const body = document.createElement("div");
      body.className = "message-body";

      const bubble = document.createElement("div");
      bubble.className = "message-bubble";
      // 用户输入有时会带入换行符（导致“你\n好”显示成竖排），这里统一折叠成空格
      const safeText =
        role === "user"
          ? String(text || "").replace(/\r?\n/g, " ").replace(/\s{2,}/g, " ").trim()
          : String(text || "");
      bubble.textContent = safeText;

      if (messageId) {
        bubble.dataset.messageId = messageId;
      }
      if (typeof messageIndex === "number") {
        bubble.dataset.messageIndex = String(messageIndex);
      }

      body.appendChild(bubble);

      if (role === "assistant") {
        const actions = document.createElement("div");
        actions.className = "assistant-actions";

        const svgRetry = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-9 9c-2.8 0-5.2-1.2-6.9-3" />
            <polyline points="3 17 3 21 7 21" />
            <polyline points="3 7 3 3 7 3" />
            <path d="M3 7a9 9 0 0 1 9-4 9 9 0 0 1 9 9" />
          </svg>
        `;

        const svgCopy = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
        `;

        const retryBtn = document.createElement("button");
        retryBtn.type = "button";
        retryBtn.className = "assistant-mini-btn";
        retryBtn.setAttribute("aria-label", "重新回复");
        retryBtn.title = "重新回复";
        retryBtn.innerHTML = svgRetry;
        retryBtn.addEventListener("click", () => {
          const prevUser = findPrevUserMessageForAssistant(row);
          if (!prevUser || !prevUser.text) return;
          const assistantMessageId = bubble.dataset.messageId || null;
          const assistantMessageIndexRaw = bubble.dataset.messageIndex;
          const assistantMessageIndex = assistantMessageIndexRaw ? Number(assistantMessageIndexRaw) : null;
          retryAssistant(prevUser.text, assistantMessageId, assistantMessageIndex, bubble);
        });

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "assistant-mini-btn";
        copyBtn.setAttribute("aria-label", "复制回答");
        copyBtn.title = "复制回答";
        copyBtn.innerHTML = svgCopy;
        copyBtn.addEventListener("click", async () => {
          const content = bubble.textContent || "";
          try {
            if (navigator.clipboard && window.isSecureContext) {
              await navigator.clipboard.writeText(content);
            } else {
              const ta = document.createElement("textarea");
              ta.value = content;
              ta.style.position = "fixed";
              ta.style.left = "-9999px";
              document.body.appendChild(ta);
              ta.select();
              document.execCommand("copy");
              document.body.removeChild(ta);
            }
            copyBtn.classList.add("copied");
            copyBtn.setAttribute("aria-label", "已复制");
            copyBtn.title = "已复制";
            setTimeout(() => {
              copyBtn.classList.remove("copied");
              copyBtn.setAttribute("aria-label", "复制回答");
              copyBtn.title = "复制回答";
            }, 900);
          } catch (e) {
            // 静默：复制失败则不影响回答显示
          }
        });

        actions.appendChild(retryBtn);
        actions.appendChild(copyBtn);
        body.appendChild(actions);
      }

      row.appendChild(body);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function cleanAssistantText(text) {
      let t = String(text || "");
      // 去掉 Markdown 粗体：**xxx** -> xxx
      t = t.replace(/\*\*(.*?)\*\*/g, "$1");
      // 去掉每行开头项目符号：* xxx / - xxx
      t = t
        .split("\n")
        .map((line) => line.replace(/^\s*[\*\-]\s+/, ""))
        .join("\n");
      return t;
    }

    function findPrevUserMessageForAssistant(assistantRowEl) {
      const rows = Array.from(messagesEl.children);
      const idx = rows.indexOf(assistantRowEl);
      if (idx <= 0) return null;
      for (let i = idx - 1; i >= 0; i--) {
        const el = rows[i];
        if (el && el.classList && el.classList.contains("user")) {
          const bubble = el.querySelector(".message-bubble");
          return {
            text: (bubble && bubble.textContent) || "",
            id: (bubble && bubble.dataset && bubble.dataset.messageId) || null,
          };
        }
      }
      return null;
    }

    async function streamAssistantReply(promptText, assistantBubble, assistantMessageId, assistantMessageIndex, session) {
      let assistantRaw = "";
      let handledMeta = false;
      isChatStreaming = true;
      let gotFirstToken = false;

      try {
        const res = await fetch("/api/chat_stream", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ message: promptText }),
        });

        if (!res.ok) throw new Error("HTTP " + res.status);
        if (!res.body) throw new Error("响应体为空，无法流式读取");

        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let sseBuffer = "";
        let done = false;

        while (!done) {
          const { value, done: readerDone } = await reader.read();
          if (readerDone) break;
          sseBuffer += decoder.decode(value, { stream: true });

          // SSE 事件通常以空行分隔：\n\n
          const parts = sseBuffer.split("\n\n");
          sseBuffer = parts.pop(); // 保留最后一个未完整事件

          for (const part of parts) {
            const lines = part.split("\n");
            for (const line of lines) {
              if (!line.startsWith("data:")) continue;
              const payload = line.slice(5).trim();
              if (!payload) continue;

              if (payload === "[DONE]") {
                done = true;
                break;
              }

              let delta = "";
              let parsedAsJson = false;
              try {
                const obj = JSON.parse(payload);
                parsedAsJson = true;
                if (obj.error) throw new Error(obj.error);
                // meta: QA 命中后触发右侧栏跳转 + 直接打开一个“以 q 原文为标题”的临时卡片
                if (obj.meta && !handledMeta) {
                  handledMeta = true;
                  try {
                    const meta = obj.meta || {};
                    const moduleKey = meta.moduleKey ? String(meta.moduleKey) : "";
                    const pageKey = meta.pageKey ? String(meta.pageKey) : "";
                    if (moduleKey) {
                      lastClickedModuleKey = moduleKey;
                      prefetchQaForModule(moduleKey, promptText); // 用用户问题排序卡片
                      // 用户正在看 AI 详情时：只后台更新，不打断当前详情视图
                      if (dynamicViewMode !== "detail") {
                        expandRightSidebarAndCollapseLeft(moduleKey);
                        if (pageKey) {
                          pushRightPage(pageKey);
                          renderRightModule();
                        }
                      }
                    }
                  } catch (e) {}
                }
                delta = obj.delta || "";
              } catch (e) {
                if (!parsedAsJson) delta = payload;
                else throw e;
              }

              if (delta) {
                // 尽量模拟“逐字打字”：把增量拆成字符逐个追加
                for (const ch of delta) {
                  assistantRaw += ch;
                  if (!gotFirstToken) gotFirstToken = true;
                  assistantBubble.textContent = cleanAssistantText(assistantRaw);
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                }
              }
            }
            if (done) break;
          }
        }

        const finalText = cleanAssistantText(assistantRaw) || "(空回复)";
        assistantBubble.textContent = finalText;

        if (session) {
          if (
            typeof assistantMessageIndex === "number" &&
            assistantMessageIndex >= 0 &&
            assistantMessageIndex < session.messages.length
          ) {
            // 用数组下标覆盖旧回答，确保“重新回复”不会追加新回答
            session.messages[assistantMessageIndex].text = finalText;
            if (assistantMessageId) session.messages[assistantMessageIndex].id = assistantMessageId;
          } else if (assistantMessageId) {
            const idx = session.messages.findIndex((m) => m.id === assistantMessageId);
            if (idx >= 0) session.messages[idx].text = finalText;
            else session.messages.push({ role: "assistant", text: finalText, id: assistantMessageId });
          } else {
            session.messages.push({ role: "assistant", text: finalText });
          }
        }

        return finalText;
      } catch (err) {
        // 兜底：如果流式失败，退回到原来的 /api/chat 一次性接口
        const res2 = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: promptText }),
        });
        if (!res2.ok) throw err;

        const data = await res2.json();
        const reply = data.reply || "(空回复)";
        const finalText = cleanAssistantText(reply) || "(空回复)";
        gotFirstToken = true;
        assistantBubble.textContent = finalText;

        if (session) {
          if (
            typeof assistantMessageIndex === "number" &&
            assistantMessageIndex >= 0 &&
            assistantMessageIndex < session.messages.length
          ) {
            session.messages[assistantMessageIndex].text = finalText;
            if (assistantMessageId) session.messages[assistantMessageIndex].id = assistantMessageId;
          } else if (assistantMessageId) {
            const idx = session.messages.findIndex((m) => m.id === assistantMessageId);
            if (idx >= 0) session.messages[idx].text = finalText;
            else session.messages.push({ role: "assistant", text: finalText, id: assistantMessageId });
          } else {
            session.messages.push({ role: "assistant", text: finalText });
          }
        }

        return finalText;
      } finally {
        isChatStreaming = false;
        flushPendingAfterChat();
      }
    }

    async function retryAssistant(promptText, assistantMessageId, assistantMessageIndex, assistantBubble) {
      if (isAwaitingAssistant) return;
      isAwaitingAssistant = true;
      const session = getCurrentSession();
      sendBtn.disabled = true;
      inputEl.disabled = true;
      statusEl.textContent = "模型思考中...";

      try {
        if (assistantBubble) assistantBubble.textContent = "";
        await streamAssistantReply(
          promptText,
          assistantBubble,
          assistantMessageId,
          assistantMessageIndex,
          session
        );
      } finally {
        isAwaitingAssistant = false;
        sendBtn.disabled = false;
        inputEl.disabled = false;
        statusEl.textContent = "就绪";
      }
    }

    async function sendMessage() {
      if (isAwaitingAssistant) return;
      const text = inputEl.value.trim();
      if (!text) return;
      isAwaitingAssistant = true;

      const session = getCurrentSession();

      const userMessageId = createMessageId();

      appendMessage("user", text, userMessageId);
      if (session) {
        session.messages.push({ role: "user", text, id: userMessageId });

        // 如果这是“草稿新会话”的第一句用户消息：才加入历史并用 API 生成会话标题
        if (draftSession && session.id === draftSession.id && !draftSession.hasUserMessage) {
          draftSession.hasUserMessage = true;

          // 先入历史，避免等待标题生成导致看不到记录
          sessions.unshift(draftSession);
          const newSessionId = draftSession.id;
          draftSession = null; // 当前会话已入历史
          renderSidebarHistory();

          // 标题生成改为后台异步，避免阻塞“发送后立刻显示”
          (async () => {
          try {
            const tr = await fetch("/api/session_title", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ message: text }),
            });
              if (!tr.ok) throw new Error("title api not ok");
              const td = await tr.json();
              const title = td && td.title ? String(td.title).trim() : "";
              if (!title) throw new Error("empty title");
              const idx = sessions.findIndex((s) => s && s.id === newSessionId);
              if (idx >= 0) {
                sessions[idx].title = title;
                renderSidebarHistory();
            }
          } catch (e) {
            const fallback = text.length > 16 ? text.slice(0, 16) + "…" : text;
              const idx = sessions.findIndex((s) => s && s.id === newSessionId);
              if (idx >= 0) {
                sessions[idx].title = fallback;
            renderSidebarHistory();
          }
            }
          })();
        }
      }

      inputEl.value = "";
      inputEl.style.height = "44px";
      updateEmptyPrompt();

      // 异步路由：不阻塞聊天回复。命中则自动展开右侧栏并跳转到对应板块/子板块。
      (async () => {
        try {
          const rr = await fetch("/api/route_board", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          if (!rr.ok) return;
          const rd = await rr.json();
          const moduleKey = rd && rd.moduleKey ? String(rd.moduleKey) : "";
          const pageKey = rd && rd.pageKey ? String(rd.pageKey) : "";
          const conf = rd && typeof rd.confidence === "number" ? rd.confidence : 0;
          if (!moduleKey || conf < 0.55) return;

          lastClickedModuleKey = moduleKey;
          prefetchQaForModule(moduleKey, text); // 用用户问题排序卡片
          // 如果用户正在查看 AI 详情：只后台更新，不打断当前详情视图
          if (dynamicViewMode !== "detail") {
            expandRightSidebarAndCollapseLeft(moduleKey);
            if (pageKey) {
              pushRightPage(pageKey);
              renderRightModule();
            }
          }
        } catch (e) {}
      })();

      // 即使右侧栏先展开、用户再提问：也用本次问题对当前模块的 AI 列表重新排序（以未改写内容排序）
      (async () => {
        try {
          const rightExpanded = document.body.classList.contains("right-expanded");
          const currentKey = String(lastClickedModuleKey || rightModuleKey || "").trim();
          if (!rightExpanded || !currentKey) return;
          prefetchQaForModule(currentKey, text);
        } catch (e) {}
      })();

      sendBtn.disabled = true;
      inputEl.disabled = true;
      statusEl.textContent = "模型思考中...";

      // 先创建一个空的助手回复气泡，流式增量持续写入它
      const assistantMessageId = createMessageId();
      const assistantBubble = appendMessage("assistant", "", assistantMessageId);
      if (assistantBubble) {
        assistantBubble.innerHTML = `<span class="chat-loading"><span class="chat-loading-spinner" aria-hidden="true"></span><span class="chat-loading-dots">正在思考</span></span>`;
      }

      try {
        await streamAssistantReply(text, assistantBubble, assistantMessageId, null, session);
      } finally {
        isAwaitingAssistant = false;
        sendBtn.disabled = false;
        inputEl.disabled = false;
        statusEl.textContent = "就绪";
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener("input", () => {
      // 只有当用户真的输入了换行（Shift+Enter）时，才允许高度随内容增长
      // 否则保持单行高度，避免短文本在窄屏下被 wrap 后看起来“强行换行”
      if (!inputEl.value.includes("\n")) {
        inputEl.style.height = "40px";
        return;
      }
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // 初始化：根据屏幕尺寸默认侧边栏展开/收起
    (function initSidebar() {
      if (isMobile()) {
        sidebarEl.classList.add("collapsed");
        document.body.classList.remove("sidebar-open");
        sidebarMaskEl.style.display = "none";
      } else {
        sidebarEl.classList.remove("collapsed");
        document.body.classList.add("sidebar-open");
        sidebarMaskEl.style.display = "none";
      }
    })();

    // 初始问候语：偏生活场景的问候
    window.addEventListener("DOMContentLoaded", () => {
      renderLoginCard();
      // 默认创建一个会话并显示欢迎语，保证历史侧边栏有内容
      const session = createNewSession();
      // 初始不展示任何默认欢迎语，让空状态提示自行显示
      session.messages = [];
      renderMessagesFromSession();
      updateEmptyPrompt();
    });
  </script>
</body>
