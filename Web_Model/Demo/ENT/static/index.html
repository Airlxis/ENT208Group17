<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>жң¬ең° LLM иҒҠеӨ©</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --brand-deep: #3f448f;
      --brand-deeper: #34387f;
      --brand-mid: #5f4fc8;
      --brand-mid-2: #6a58d4;
      --brand-mid-3: #5647bc;
      --bg-1: #f7f4ff;
      --bg-2: #ede8ff;
      --bg-3: #e0daf8;
      --card: #ffffff;
      --line: #dfe3f1;
      --text: #242545;
      --muted: #726f99;
      --soft: #f6f8fd;
      --soft-2: #f1f4fc;
      --active: #e9eefc;
      --sidebar-bg: #ffffff;
      --sidebar-border: #e5e8f4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 520px at 12% 8%, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0) 56%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 32px 0;
      padding-left: 0;
      padding-right: 0;
      transition: padding-left 0.2s ease, padding-right 0.2s ease;
    }

    /* жЎҢйқўз«Ҝпјҡдҫ§иҫ№ж Ҹж”¶иө·ж—¶з»ҷе·Ұдҫ§жҢүй’®йў„з•ҷз©әзҷҪиҫ№ */
    @media (min-width: 901px) {
      body {
        padding-left: 46px;
      }
      body.sidebar-open {
        padding-left: 324px;
      }
    }

    body.sidebar-open {
      padding-left: 320px;
    }

    .app {
      width: 100%;
      max-width: 1400px; /* и®©еҜ№иҜқзҷҪжЎҶжӣҙиҙҙиҝ‘дёӨдҫ§иҫ№ж Ҹ */
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);
      padding: 0 14px; /* еҮҸе°‘е·ҰеҸіз•ҷзҷҪ */
    }

    .header {
      padding: 8px 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--card);
      cursor: pointer;
      display: none; /* жЎҢйқўз«ҜдёҚжҳҫзӨәпјҢйҖҡиҝҮдҫ§иҫ№ж ҸеҸідёҠи§’жҢүй’®жҺ§еҲ¶еұ•ејҖ/ж”¶иө· */
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, border-color 0.15s ease;
      flex: 0 0 auto;
    }

    .menu-btn:hover {
      background: var(--soft);
      border-color: #cfc4f0;
    }

    .hamburger {
      width: 16px;
      height: 12px;
      position: relative;
    }

    .hamburger span {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
    }

    .hamburger span:nth-child(1) { top: 0; }
    .hamburger span:nth-child(2) { top: 5px; }
    .hamburger span:nth-child(3) { top: 10px; }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    .chat-container {
      flex: 1;
      margin-top: 8px;
      padding: 12px;
      border-radius: 16px;
      background: var(--card);
      box-shadow: 0 10px 15px -10px rgba(15, 23, 42, 0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* з©әзҷҪжҖҒпјҲChatGPT йЈҺж јпјүпјҡй—®еҖҷиҜӯ + зҹӯиҫ“е…ҘжЎҶеұ…дёӯеұ•зӨә */
    .chat-container.chat-empty {
      justify-content: center;
      padding: 26px 18px 22px;
    }

    .chat-container.chat-empty .messages {
      display: none;
    }

    .chat-container.chat-empty .empty-prompt {
      position: static;
      display: flex;
      bottom: auto;
      pointer-events: none;
      padding: 0 0 14px;
    }

    .chat-container.chat-empty .input-area {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
      justify-content: center;
    }

    .chat-container.chat-empty .input-area textarea {
      flex: 0 1 auto;
      width: min(560px, 92%); /* зәҰзј©зҹӯеҲ°еҺҹжқҘзҡ„ 2/3 */
      min-width: 260px;
    }

    .empty-prompt {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 80px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      padding: 24px 16px;
      gap: 10px;
      pointer-events: none; /* йҳІжӯўйҒ®жҢЎиҫ“е…ҘеҢәеҹҹдәӨдә’ */
    }

    .empty-prompt-title {
      font-size: 20px;
      color: var(--text);
      font-weight: 650;
    }

    .empty-prompt-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      margin-bottom: 8px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-body {
      max-width: 100%;
      display: flex;
      flex-direction: column;
    }

    .message-row.user .message-body {
      align-items: flex-end;
    }

    .message-row.assistant .message-body {
      align-items: flex-start;
    }

    .assistant-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .assistant-mini-btn {
      height: 26px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      width: 28px;
      padding: 0;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      user-select: none;
    }

    .assistant-mini-btn svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .assistant-mini-btn.copied {
      color: #16a34a;
      border-color: #86efac;
      background: #f0fdf4;
    }

    .assistant-mini-btn:hover {
      background: var(--soft);
      border-color: #c8bceb;
    }

    .assistant-mini-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message-bubble {
      /* и®©ж°”жіЎвҖңеҶ…е®№е®ҪеәҰиҮӘйҖӮеә”вҖқпјҢеҸӘеңЁи¶…иҝҮжңҖеӨ§е®ҪеәҰж—¶жүҚиҮӘеҠЁжҚўиЎҢ */
      display: inline-block;
      max-width: 560px;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      /* иӢұж–ҮжҚўиЎҢпјҡдёҚеңЁеҚ•иҜҚдёӯй—ҙејәиЎҢжӢҶејҖпјҲйңҖиҰҒе®Ңж•ҙиҜҚиҜӯ/з©әж јжүҚиғҪжҚўиЎҢпјү */
      word-break: normal;
      overflow-wrap: normal;
    }

    .message-row.user .message-bubble {
      background: linear-gradient(135deg, #7c6ae0, #6a58d4);
      color: #ffffff;
      border-bottom-right-radius: 4px;
      /* з”ЁжҲ·ж¶ҲжҒҜдёҚйңҖиҰҒдҝқз•ҷжҚўиЎҢиҜӯд№үпјҢйҒҝе…Қзҹӯж–Үжң¬еңЁзӘ„е®ҪеәҰдёӢиў«жӢҶжҲҗеӨҡиЎҢ/з«–жҺ’ */
      white-space: normal;
    }

    .message-row.assistant .message-bubble {
      background: #f3f4f6;
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message-bubble a {
      color: #335fc7;
      text-decoration: underline !important;
      text-underline-offset: 2px;
      cursor: pointer;
      word-break: break-all;
    }

    .message-bubble a:hover {
      color: #274da7;
    }

    @media (max-width: 900px) {
      .message-bubble {
        max-width: 100%;
      }
    }

    .input-area {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      min-width: 0;
      max-width: 580px; /* зәҰзј©зҹӯеҲ°еҺҹжқҘзҡ„ 2/3 */
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    /* е·ҰеҸіиҫ№ж ҸйғҪеұ•ејҖж—¶пјҡдёӯй—ҙеҢәеҹҹжӣҙзӘ„пјҢиҫ“е…ҘжЎҶд№ҹи·ҹйҡҸж”¶дёҖзӮ№ */
    body.sidebar-open.right-expanded .input-area {
      max-width: 520px;
    }

    textarea {
      flex: 1 0 auto;
      min-width: 200px;
      resize: none;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 8px 12px;
      font-size: 14px;
      line-height: 1.4;
      outline: none;
      max-height: 110px;
      min-height: 40px;
      /* зҰҒз”ЁиҮӘеҠЁжҚўиЎҢпјҡзҹӯиҫ“е…Ҙж—¶йҒҝе…ҚвҖңдёӨдёӘеӯ—е°ұжҚўиЎҢвҖқпјҲдҝқжҢҒеҚ•иЎҢпјҢе®ҪеәҰдёҚеӨҹе°ұжЁӘеҗ‘ж»ҡеҠЁпјү */
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
      overflow-x: auto;
    }

    #send {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      padding: 0;
      border-radius: 50%;
      background: var(--brand-mid);
      color: #ffffff;
      border: 1px solid transparent;
    }

    #send svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    #send:not(:disabled):hover {
      background: var(--brand-mid-3);
    }

    #send:disabled {
      background: #9ca3af;
      border-color: #9ca3af;
    }

    textarea:focus {
      border-color: var(--brand-mid);
      box-shadow: 0 0 0 1px rgba(95, 79, 200, 0.22);
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 0 18px;
      height: 38px;
      background: var(--brand-mid-2);
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    button:not(:disabled):hover {
      background: var(--brand-mid-3);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      margin-left: 4px;
    }

    @media (max-width: 640px) {
      .app {
        padding: 0 8px;
      }

      .chat-container {
        padding: 10px;
      }
    }

    /* Right Sidebar (new): жЁЎеқ—жңҚеҠЎ */
    .right-sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      height: 100vh;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--sidebar-border);
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.04);
      z-index: 60;
      display: flex;
      flex-direction: column;
      padding: 18px;
      overflow: hidden; /* йЎ¶йғЁжҢүй’®дёҚж»ҡеҠЁпјҢж»ҡеҠЁдәӨз»ҷдёӢж–№еҢәеҹҹ */
      transition: width 0.22s ease;
      /* жң¬иә«дёә fixedпјҢеҸҜдҪңдёәз»қеҜ№е®ҡдҪҚеӯҗе…ғзҙ еҸӮиҖғ */
    }

    .right-sidebar.expanded {
      width: 864px; /* 360 * 2.4 */
      padding-top: 60px; /* з»ҷе·ҰдёҠи§’иҝ”еӣһжҢүй’®з•ҷеҮәз©әй—ҙпјҢйҒҝе…ҚйҒ®жҢЎеҶ…е®№ */
    }

    .right-sidebar-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 12px;
      padding: 2px 2px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .right-sidebar-card {
      /* ж”¶зј©жҖҒпјҡжҢүй’®дёҚйңҖиҰҒеҶҚеҘ—дёҖеұӮвҖңеҚЎзүҮжЎҶвҖқ */
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1 1 auto;
      overflow: hidden; /* еҸӘе…Ғи®ёдёӢж–№еҠЁжҖҒеҢәеҹҹж»ҡеҠЁ */
    }

    .right-module-content {
      display: none;
      flex: 0 0 auto; /* и®©дёӢж–№ AI еҢәеҹҹжңүзЁіе®ҡз©әй—ҙ */
      margin-top: 12px;
      border-radius: 16px;
      min-height: 220px;
      background: transparent;
      overflow: auto;
      max-height: 54vh; /* йҒҝе…ҚжҠҠ AI еҢәеҹҹжҢӨеҲ°зңӢдёҚи§Ғ */
    }

    /* Right module page (expanded content) */
    .module-page {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 25px -18px rgba(15, 23, 42, 0.35);
      padding: 14px;
    }

    .module-page-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .module-page-title {
      font-weight: 900;
      font-size: 14px;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .module-inline-back {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      width: 38px;
      height: 34px;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: var(--text); /* зЎ®дҝқиҝ”еӣһеӣҫж ҮдёҚдјҡеҸҳжҲҗзҷҪиүІ */
    }

    .module-inline-back:hover {
      background: var(--soft);
      border-color: #c8bceb;
    }

    .module-inline-back svg {
      width: 16px;
      height: 16px;
      display: block;
      color: currentColor;
    }

    .module-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: stretch;
    }

    @media (max-width: 1100px) {
      .right-sidebar.expanded .module-grid {
        grid-template-columns: 1fr;
      }
    }

    .module-action-btn {
      border: 1px solid var(--line);
      background: #f9fbff;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-height: 72px;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.06s ease;
    }

    .module-action-btn:hover {
      background: var(--soft-2);
      border-color: #c8bceb;
    }

    .module-action-btn:active {
      transform: translateY(1px);
    }

    .module-action-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: var(--brand-mid);
      margin-top: 1px;
    }

    .module-action-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .module-action-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .module-action-title {
      font-weight: 900;
      font-size: 13px;
      color: var(--text);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 1.35em;
    }

    .module-action-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 1.35em;
    }

    .module-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #ece8ff;
    }

    .module-paragraph {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .module-list {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
    }

    .schedule-wrap {
      display: grid;
      gap: 12px;
    }

    .schedule-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .schedule-board {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .schedule-head-row,
    .schedule-body-row {
      width: 100%;
      display: grid;
      grid-template-columns: 56px repeat(5, minmax(0, 1fr));
    }

    .schedule-head-row {
      border-bottom: 1px solid #d7d9df;
      background: #f4f5f7;
    }

    .schedule-body-row {
      background: #fff;
    }

    .schedule-time-head {
      border-right: 1px solid #d7d9df;
      font-size: 12px;
      font-weight: 800;
      color: #445;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
    }

    .schedule-day-head {
      border-right: 2px solid #b8c1d2;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #111827;
    }

    .schedule-time-body {
      border-right: 1px solid #d7d9df;
    }

    .schedule-grid {
      min-width: 0;
      width: 100%;
      display: grid;
      grid-template-columns: 56px repeat(5, minmax(0, 1fr));
      grid-template-rows: 58px auto;
    }

    .schedule-cell {
      border-right: 1px solid #d7d9df;
      border-bottom: 1px solid #d7d9df;
      box-sizing: border-box;
    }

    .schedule-head {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      background: #f4f5f7;
    }

    .schedule-head-day {
      width: 100%;
      display: grid;
      gap: 2px;
      justify-items: center;
      padding-top: 2px;
    }

    .schedule-head-lanes {
      width: calc(100% - 10px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 10px;
      color: #6b7280;
      font-weight: 700;
    }

    .schedule-head-lanes span {
      text-align: center;
      border: 1px solid #d5d9e6;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      line-height: 1.2;
      padding: 1px 0;
    }

    .schedule-head-time {
      font-size: 12px;
      color: #445;
      font-weight: 700;
    }

    .schedule-time-col {
      position: relative;
      height: var(--schedule-height, 480px);
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 19px,
          #e5e7ee 19px,
          #e5e7ee 20px
        );
    }

    .schedule-time-label {

    function _normalizeActivityDayToken(text) {

        tues: "tue",
        tuesday: "tue",

        "жҳҹжңҹдәҢ": "tue",

    function _parseHmToken(raw) {
      const t = String(raw || "").trim().replace(/\s+/g, "").replace(/пјҡ/g, ":").replace(/\./g, ":");
      if (!t) return "";
      let h = null;
      let m = null;
      let mt = t.match(/^(\d{1,2})зӮ№(?:(\d{1,2})еҲҶ?)?$/);
      if (mt) {
        h = Number(mt[1]);
        m = mt[2] != null ? Number(mt[2]) : 0;
      } else {
        mt = t.match(/^(\d{1,2})(?::(\d{1,2}))?$/);
        if (!mt) return "";
        h = Number(mt[1]);
        m = mt[2] != null ? Number(mt[2]) : 0;
      }
      if (!Number.isFinite(h) || !Number.isFinite(m)) return "";
      if (h < 0 || h > 23 || m < 0 || m > 59) return "";
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function _extractWeekdayKey(text) {
      const s = String(text || "");
      const zh = s.match(/(?:е‘Ё|жҳҹжңҹ|зӨјжӢң)\s*([дёҖдәҢдёүеӣӣдә”е…ӯж—ҘеӨ©1234567])/);
      if (zh) {
        const token = zh[1];
        if (token === "е…ӯ" || token === "6") return { day: "sat", unsupported: true };
        if (token === "ж—Ҙ" || token === "еӨ©" || token === "7") return { day: "sun", unsupported: true };
        const m = { дёҖ: "mon", "1": "mon", дәҢ: "tue", "2": "tue", дёү: "wed", "3": "wed", еӣӣ: "thu", "4": "thu", дә”: "fri", "5": "fri" };
        const d = m[token] || "";
        return { day: d, unsupported: false };
      }
      const en = s.match(/\b(mon(?:day)?|tue(?:s|sday)?|wed(?:nesday)?|thu(?:r|rs|rsday)?|fri(?:day)?|sat(?:urday)?|sun(?:day)?)\b/i);
      if (en) {
        const d = _normalizeActivityDayToken(en[1]);
        const unsupported = d !== "mon" && d !== "tue" && d !== "wed" && d !== "thu" && d !== "fri";
        return { day: d, unsupported };
      }
      return { day: "", unsupported: false };
    }

    function _extractTimeRange(text) {
      const s = String(text || "");
      const m = s.match(/(\d{1,2}(?:[:пјҡ.]\d{1,2}|зӮ№(?:\d{1,2})?(?:еҲҶ)?)?)\s*(?:еҲ°|иҮі|~|пҪһ|-|вҖ”|вҖ“)\s*(\d{1,2}(?:[:пјҡ.]\d{1,2}|зӮ№(?:\d{1,2})?(?:еҲҶ)?)?)/);
      if (!m) return { start: "", end: "", raw: "" };
      const start = _parseHmToken(m[1]);
      const end = _parseHmToken(m[2]);
      return { start, end, raw: m[0] || "" };
    }

    function _parseChineseHourToken(raw) {
      const s = String(raw || "").trim();
      if (!s) return null;
      const digit = {
        "\u96f6": 0,
        "\u4e00": 1,
        "\u4e8c": 2,
        "\u4e24": 2,
        "\u4e09": 3,
        "\u56db": 4,
        "\u4e94": 5,
        "\u516d": 6,
        "\u4e03": 7,
        "\u516b": 8,
        "\u4e5d": 9,
      };
      if (Object.prototype.hasOwnProperty.call(digit, s)) return digit[s];
      if (s === "\u5341") return 10;
      if (s.startsWith("\u5341")) return 10 + (digit[s.slice(1)] || 0);
      if (s.endsWith("\u5341")) return (digit[s.slice(0, -1)] || 0) * 10;
      const m = s.match(/^([\u4e00\u4e8c\u4e24\u4e09\u56db\u4e94\u516d\u4e03\u516b\u4e5d])\u5341([\u4e00\u4e8c\u4e09\u56db\u4e94\u516d\u4e03\u516b\u4e5d])?$/);
      if (m) return (digit[m[1]] || 0) * 10 + (m[2] ? digit[m[2]] || 0 : 0);
      return null;
    }

    function _extractDayPeriod(text) {
      const s = String(text || "");
      if (/\u4e0a\u5348|morning/i.test(s)) return "morning";
      if (/\u4e2d\u5348|noon/i.test(s)) return "noon";
      if (/\u4e0b\u5348|afternoon/i.test(s)) return "afternoon";
      if (/\u665a\u4e0a|\u508d\u665a|evening|night/i.test(s)) return "evening";
      return "";
    }

    function _normalizeSchedulePeriod(period) {
      const s = String(period || "").toLowerCase();
      if (/morning|\u4e0a\u5348/.test(s)) return "morning";
      if (/noon|\u4e2d\u5348/.test(s)) return "noon";
      if (/afternoon|\u4e0b\u5348/.test(s)) return "afternoon";
      if (/evening|night|\u665a\u4e0a|\u508d\u665a/.test(s)) return "evening";
      return "";
    }

    function _adjustHmByDayPeriod(hm, period) {
      const p = _normalizeSchedulePeriod(period);
      if (!hm || (p !== "afternoon" && p !== "evening")) return hm;
      const [hh, mm] = String(hm).split(":").map(Number);
      if (!Number.isFinite(hh) || hh >= 12) return hm;
      return `${String(hh + 12).padStart(2, "0")}:${String(mm || 0).padStart(2, "0")}`;
    }

    function _parseHmTokenSmart(raw, period = "") {
      const direct = _parseHmToken(raw);
      if (direct) return _adjustHmByDayPeriod(direct, period);
      const t = String(raw || "").trim().replace(/\s+/g, "");
      const m = t.match(/^([\u96f6\u4e00\u4e8c\u4e24\u4e09\u56db\u4e94\u516d\u4e03\u516b\u4e5d\u5341]{1,3})\u70b9(?:(\d{1,2})\u5206?)?$/);
      if (!m) return "";
      const h = _parseChineseHourToken(m[1]);
      const minute = m[2] != null ? Number(m[2]) : 0;
      if (!Number.isFinite(h) || !Number.isFinite(minute) || h < 0 || h > 23 || minute < 0 || minute > 59) return "";
      return _adjustHmByDayPeriod(`${String(h).padStart(2, "0")}:${String(minute).padStart(2, "0")}`, period);
    }

    function _extractTimeRangeSmart(text) {
      const s = String(text || "");
      const token = "(?:\\d{1,2}(?:[:пјҡ.]\\d{1,2}|\\u70b9(?:\\d{1,2})?(?:\\u5206)?)?|[\\u96f6\\u4e00\\u4e8c\\u4e24\\u4e09\\u56db\\u4e94\\u516d\\u4e03\\u516b\\u4e5d\\u5341]{1,3}\\u70b9(?:\\d{1,2})?(?:\\u5206)?)";
      const m = s.match(new RegExp(`(${token})\\s*(?:\\u5230|\\u81f3|~|\\uFF5E|-|\\u2014|\\u2013)\\s*(${token})`));
      if (!m) {
        const fallback = _extractTimeRange(text);
        const period = _extractDayPeriod(s);
        return {
          start: _adjustHmByDayPeriod(fallback.start, period),
          end: _adjustHmByDayPeriod(fallback.end, period),
          raw: fallback.raw || "",
          period,
        };
      }
      const period = _extractDayPeriod(s);
      return {
        start: _parseHmTokenSmart(m[1], period),
        end: _parseHmTokenSmart(m[2], period),
        raw: m[0] || "",
        period,
      };
    }

    function _extractActivityName(text, timeRangeRaw) {
      const s = String(text || "");
      const explicit = s.match(/(?:еҠ |ж–°еўһ|ж·»еҠ |е®үжҺ’|еҲӣе»ә|add|create|schedule)(?:дёӘ|дёҖдёӘ)?(?:жҙ»еҠЁ|event)?[:пјҡ\s]*([^\nпјҢгҖӮ,пјӣ;]+)/i);
      if (explicit && explicit[1]) {
        const v = explicit[1].trim();
        if (v) return v;
      }
      let t = s;
      if (timeRangeRaw) t = t.replace(timeRangeRaw, " ");
      t = t
        .replace(/(?:е‘Ё|жҳҹжңҹ|зӨјжӢң)\s*[дёҖдәҢдёүеӣӣдә”е…ӯж—ҘеӨ©1234567]/g, " ")
        .replace(/\b(mon(?:day)?|tue(?:s|sday)?|wed(?:nesday)?|thu(?:r|rs|rsday)?|fri(?:day)?|sat(?:urday)?|sun(?:day)?)\b/gi, " ")
        .replace(/(?:еҠ |ж–°еўһ|ж·»еҠ |е®үжҺ’|еҲӣе»ә|жҙ»еҠЁ|ж—ҘзЁӢ|иЎҢзЁӢ|event|schedule|add|create|её®жҲ‘|иҜ·|дёҖдёӢ|дёҖдёӘ|дёӘ)/gi, " ")
        .replace(/(?:з®Җд»Ӣ|д»Ӣз»Қ|иҜҙжҳҺ|еӨҮжіЁ|intro|description)\s*[:пјҡ].*$/i, " ")
        .replace(/[пјҢ,гҖӮпјӣ;]+/g, " ")

    function _extractActivityIntro(text) {

    function _loadScheduleCourseItems() {
      try {
        const raw = localStorage.getItem(SCHEDULE_COURSE_STORAGE_KEY);
        if (!raw) return _cloneDefaultScheduleCourses();
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return _cloneDefaultScheduleCourses();
        const normalized = arr
          .map((x) => {
            const day = _normalizeActivityDayToken(x && x.day);
            const start = _parseHmToken((x && x.start) || "");
            const end = _parseHmToken((x && x.end) || "");
            const name = String((x && x.name) || "").trim();
            const location = String((x && x.location) || "").trim();
            const teacher = String((x && x.teacher) || "").trim();
            if (!day || !name || !start || !end) return null;
            if (!_isWithinScheduleRange(start, end, SCHEDULE_RANGE_START_MIN, SCHEDULE_RANGE_END_MIN)) return null;
            return { day, name, location, teacher, start, end };
          })
          .filter(Boolean);
        return normalized.length ? _sortScheduleCourseItems(normalized) : _cloneDefaultScheduleCourses();
      } catch (e) {
        return _cloneDefaultScheduleCourses();
      }
    }

        const raw = localStorage.getItem(SCHEDULE_ACTIVITY_STORAGE_KEY);
        if (!raw) return _cloneDefaultScheduleActivities();
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return _cloneDefaultScheduleActivities();
        const normalized = arr
          .map((x) => {
            const day = _normalizeActivityDayToken(x && x.day);
            const [st, ed] = String((x && x.time) || "").split("-");
            const start = _parseHmToken(st);
            const end = _parseHmToken(ed);
            const name = String((x && x.name) || "").trim();
            const intro = String((x && x.intro) || "").trim();
            if (!day || !name || !start || !end) return null;
            if (!_isWithinScheduleRange(start, end, SCHEDULE_RANGE_START_MIN, SCHEDULE_RANGE_END_MIN)) return null;
            return { day, name, intro, time: `${start}-${end}` };
          })
          .filter(Boolean);
        return normalized.length ? _sortScheduleActivityItems(normalized) : _cloneDefaultScheduleActivities();
      } catch (e) {
        return _cloneDefaultScheduleActivities();
      }
    }

    function _detectScheduleAction(text) {
      const s = String(text || "");
      if (/(еҲ йҷӨ|еҲ жҺү|з§»йҷӨ|еҸ–ж¶Ҳ|remove|delete|cancel)/i.test(s)) return "delete";
      if (/(дҝ®ж”№|и°ғж•ҙ|ж”№еҲ°|ж”№жҲҗ|ж”№дёә|еҸҳжӣҙ|жӣҙж–°|reschedule|change|move|update)/i.test(s)) return "update";
      if (/(еҠ |ж–°еўһ|ж·»еҠ |е®үжҺ’|еҲӣе»ә|еҠ е…Ҙ|add|create|schedule|е®үжҺ’еҲ°)/i.test(s)) return "add";
      return "";
    }

    function _hasCourseCodeLikeToken(text) {
      return /[A-Za-z]{2,}\d{2,}[A-Za-z0-9]*/.test(String(text || ""));
    }

    function _hasExplicitCourseTarget(text) {
      const s = String(text || "");
      return /(?:\u8bfe\u7a0b\u8868|\u8bfe\u8868|\u8bfe\u7a0b|\u4e0a\u8bfe|\u6388\u8bfe|\u8bb2\u5ea7\u8bfe|\u6559\u5ba4|\u8001\u5e08|\u6559\u5e08|lecture|class|course|timetable|room|teacher|lec|lab|prac)/i.test(s) || _hasCourseCodeLikeToken(s);
    }

    function _hasExplicitActivityTarget(text) {
      const s = String(text || "");
      return /(?:\u6821\u56ed\u6d3b\u52a8|\u4e2a\u4eba\u6d3b\u52a8|\u6d3b\u52a8|\u884c\u7a0b|\u4e8b\u9879|\u4f1a\u8bae|event|activity|meeting|appointment)/i.test(s);
    }

    function _detectScheduleTarget(text) {
      const s = String(text || "");
      if (_hasExplicitCourseTarget(s)) return "course";
      if (_hasExplicitActivityTarget(s)) return "activity";
      if (/(иҜҫзЁӢиЎЁ|иҜҫиЎЁ|иҜҫзЁӢ|дёҠиҜҫ|lecture|class|course|timetable|иҖҒеёҲ|ж•ҷеёҲ|ж•ҷе®Ө|room|teacher|lec|lab|prac)/i.test(s)) return "course";

    function _hasPersonalScheduleIntent(text) {
      const s = String(text || "");
      const action = _detectScheduleAction(s);
      const target = _detectScheduleTarget(s);
      const dayInfo = _extractWeekdayKey(s);
      const range = _extractTimeRangeSmart(s);
      if (/(дёӘдәәж—ҘзЁӢ|жҲ‘зҡ„ж—ҘзЁӢ|ж—ҘзЁӢиЎЁ|ж—ҘзЁӢдҝ®ж”№|дҝ®ж”№ж—ҘзЁӢ|иҜҫзЁӢиЎЁ|иҜҫиЎЁ|дёӘдәәиҜҫиЎЁ|жҲ‘зҡ„иҜҫиЎЁ|personal schedule|my schedule|course schedule|class schedule|timetable)/i.test(s)) {

    function _isScheduleEllipsisIntent(text, focus = null) {
      const s = String(text || "").trim();

      if (_hasPersonalScheduleIntent(s)) return true;
      if (!focus) return false;
      const hasPronounRef = /(?:\u5b83|\u5b83\u4eec|\u8fd9\u4e2a|\u90a3\u4e2a|\u521a\u624d|\u4e0a\u4e00\u4e2a|it|that|previous)/i.test(s);

    function _extractScheduleField(text, labelRegex) {

    function _extractCourseLocation(text) {
      return _extractScheduleField(text, /(?:ең°зӮ№|ж•ҷе®Ө|дҪҚзҪ®|location|room)\s*[:пјҡ]?\s*([A-Za-z0-9_\- ]{2,40})/i);

    function _extractCourseTeacher(text) {

    function _stripScheduleNoise(text, kind, timeRangeRaw) {
      let t = String(text || "");
      if (timeRangeRaw) t = t.replace(timeRangeRaw, " ");
      t = t
        .replace(/(?:е‘Ё|жҳҹжңҹ|зӨјжӢң)\s*[дёҖдәҢдёүеӣӣдә”е…ӯж—ҘеӨ©1234567]/g, " ")
        .replace(/\b(mon(?:day)?|tue(?:s|sday)?|wed(?:nesday)?|thu(?:r|rs|rsday)?|fri(?:day)?|sat(?:urday)?|sun(?:day)?)\b/gi, " ")
        .replace(/(?:ең°зӮ№|ж•ҷе®Ө|дҪҚзҪ®|location|room)\s*[:пјҡ]?\s*[A-Za-z0-9_\- ]{2,40}/gi, " ")
        .replace(/(?:иҖҒеёҲ|ж•ҷеёҲ|жҺҲиҜҫдәә|teacher|lecturer)\s*[:пјҡ]?\s*[^пјҢ,гҖӮпјӣ;\n]{1,40}/gi, " ")
        .replace(/(?:з®Җд»Ӣ|д»Ӣз»Қ|иҜҙжҳҺ|еӨҮжіЁ|intro|description)\s*[:пјҡ].*$/i, " ")
        .replace(/(?:дёӘдәәж—ҘзЁӢ|жҲ‘зҡ„ж—ҘзЁӢ|ж—ҘзЁӢиЎЁ|ж—ҘзЁӢ|иЎҢзЁӢ|иҜҫзЁӢиЎЁ|иҜҫиЎЁ|дёӘдәәиҜҫиЎЁ|жҲ‘зҡ„иҜҫиЎЁ|calendar|personal schedule|my schedule|course schedule|class schedule|timetable)/gi, " ")
        .replace(/(?:её®жҲ‘|иҜ·|дёҖдёӢ|дёҖдёӘ|дёҖжқЎ|дёҖй—Ё|дёҖиҠӮ|дёӘ|й—Ё|иҠӮ)/gi, " ")
        .replace(/(?:еҠ |ж–°еўһ|ж·»еҠ |е®үжҺ’|еҲӣе»ә|еҠ е…Ҙ|еҲ йҷӨ|еҲ жҺү|з§»йҷӨ|еҸ–ж¶Ҳ|дҝ®ж”№|и°ғж•ҙ|ж”№еҲ°|ж”№жҲҗ|ж”№дёә|еҸҳжӣҙ|жӣҙж–°|add|create|remove|delete|cancel|reschedule|change|move|update|schedule)/gi, " ");
      if (kind === "course") t = t.replace(/(?:иҜҫзЁӢ|дёҠиҜҫ|lecture|class|course|lec|lab|prac)/gi, " ");

    function _extractScheduleName(text, kind, action, timeRangeRaw) {
      const s = String(text || "");
      const targetWords = kind === "course" ? "(?:иҜҫзЁӢ|иҜҫ|class|course|lecture)?" : "(?:жҙ»еҠЁ|дәӢйЎ№|event|activity|meeting)?";

          if (v) return v;

      if (!cleaned) return "";
      return cleaned.length > 80 ? cleaned.slice(0, 80).trim() : cleaned;

    function _extractScheduleMatchName(text, kind, action, timeRangeRaw) {
      const s = String(text || "");
      const beforeChange = s.match(/(?:жҠҠ|е°Ҷ)?\s*([^пјҢгҖӮпјӣ;\n]{2,80}?)\s*(?:ж”№еҲ°|ж”№жҲҗ|ж”№дёә|и°ғж•ҙеҲ°|и°ғж•ҙдёә|еҸҳжӣҙдёә|жӣҙж–°дёә|еҲ жҺү|еҲ йҷӨ|з§»йҷӨ|еҸ–ж¶Ҳ|remove|delete|cancel|reschedule|change|move|update)/i);

      if (afterVerb && afterVerb[1]) {

        if (v) return v;
      }

    }

    function _normalizeScheduleCommand(raw) {
      const src = raw && typeof raw === "object" ? raw : {};
      const item0 = src.item && typeof src.item === "object" ? src.item : {};
      const item = { ...item0 };
      if (item.day) item.day = _normalizeActivityDayToken(item.day);
      if (item.start) item.start = _parseHmToken(item.start);
      if (item.end) item.end = _parseHmToken(item.end);

      const target = String(src.target || "").toLowerCase();

        target: target === "course" || target === "activity" ? target : "",
        matchName: String(src.matchName || src.match_name || "").trim(),

    function _focusToScheduleCommand(text, focus) {

      if (range.end) item.end = range.end;

    function _parseScheduleCommandLocal(text, focus = null) {
      const s = String(text || "").trim();

      const dayInfo = _extractWeekdayKey(s);
      const range = _extractTimeRangeSmart(s);

      if (dayInfo.day) item.day = dayInfo.day;
      if (range.start) item.start = range.start;
      if (range.end) item.end = range.end;

    function _scheduleSnapshotForModel() {

    async function _parseScheduleCommandByModel(text, context = []) {

    function _isScheduleCommandLocallyComplete(command) {

    function _compactScheduleName(s) {

    function _findScheduleItemIndex(list, command) {
      const arr = Array.isArray(list) ? list : [];
      const item = (command && command.item) || {};
      const candidates = [command && command.matchName, item.name].map((x) => _compactScheduleName(x)).filter(Boolean);
      let bestIdx = -1;
      let bestScore = 0;
      arr.forEach((x, idx) => {
        const name = _compactScheduleName(x && x.name);
        let score = 0;
        candidates.forEach((cand) => {
          if (!cand || !name) return;
          if (cand === name) score = Math.max(score, 100);
          else if (name.includes(cand) || cand.includes(name)) score = Math.max(score, 82);

        if (item.day && x.day === item.day) score += 5;
        if (item.start && item.end) {
          const sameTime = x.start === item.start && x.end === item.end;
          const sameActTime = x.time === `${item.start}-${item.end}`;
          if (sameTime || sameActTime) score = Math.max(score, 75);
        }
        if (score > bestScore) {
          bestScore = score;
          bestIdx = idx;
        }
      });
      return bestScore >= 75 ? bestIdx : -1;

    function _scheduleItemTime(item) {

    function _schedulePeriodRange(period) {

      if (p === "noon") return { startMin: 11 * 60, endMin: 13 * 60 };

    function _timeRangesOverlap(aStart, aEnd, bStart, bEnd) {
      if (!Number.isFinite(aStart) || !Number.isFinite(aEnd) || !Number.isFinite(bStart) || !Number.isFinite(bEnd)) return false;
      return Math.max(aStart, bStart) < Math.min(aEnd, bEnd);

    function _levenshteinDistance(a, b) {
      const s = String(a || "");
      const t = String(b || "");
      if (s === t) return 0;
      if (!s.length) return t.length;
      if (!t.length) return s.length;
      let prev = Array.from({ length: t.length + 1 }, (_, i) => i);
      for (let i = 1; i <= s.length; i++) {
        const cur = [i];
        for (let j = 1; j <= t.length; j++) {
          const cost = s[i - 1] === t[j - 1] ? 0 : 1;
          cur[j] = Math.min(cur[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
        }
        prev = cur;
      }
      return prev[t.length];
    }

    function _scheduleNameSimilarityScore(candidate, actual) {
      const cand = _compactScheduleName(candidate);
      const name = _compactScheduleName(actual);
      if (!cand || !name) return 0;
      if (cand === name) return 100;
      if (cand.includes(name) || name.includes(cand)) return Math.min(94, 78 + Math.min(cand.length, name.length));
      const dist = _levenshteinDistance(cand, name);
      const ratio = 1 - dist / Math.max(cand.length, name.length, 1);
      if (ratio >= 0.9) return 92;
      if (ratio >= 0.82) return 84;
      if (ratio >= 0.74 && Math.min(cand.length, name.length) >= 6) return 76;
      return 0;
    }

    function _scheduleNameCandidates(command) {
      const item = (command && command.item) || {};
      const raw = String((command && command.rawText) || "");
      const base = [command && command.matchName, item.name];
      const tokenMatches = raw.match(/[A-Za-z]{2,}\d+[A-Za-z0-9]*/g) || [];
      return [...base, ...tokenMatches].map((x) => String(x || "").trim()).filter(Boolean);
    }

    function _findScheduleItemMatchSmart(list, command) {
      const arr = Array.isArray(list) ? list : [];
      const item = (command && command.item) || {};
      const candidates = _scheduleNameCandidates(command);
      const periodRange = _schedulePeriodRange(item.period);
      let best = { idx: -1, score: 0, nameScore: 0 };
      let secondScore = 0;
      arr.forEach((x, idx) => {
        const itemTime = _scheduleItemTime(x);
        let nameScore = 0;
        candidates.forEach((cand) => {
          nameScore = Math.max(nameScore, _scheduleNameSimilarityScore(cand, x && x.name));
        });

        let score = nameScore;
        if (item.day && x.day === item.day) score += 28;
        if (item.start && item.end) {
          const desiredStart = _toMinutes(item.start);
          const desiredEnd = _toMinutes(item.end);
          const exact = itemTime.start === item.start && itemTime.end === item.end;
          const overlaps = _timeRangesOverlap(desiredStart, desiredEnd, itemTime.startMin, itemTime.endMin);
          if (exact) score += 45;
          else if (overlaps) score += 28;
        } else if (periodRange && _timeRangesOverlap(periodRange.startMin, periodRange.endMin, itemTime.startMin, itemTime.endMin)) {
          score += 35;
        }

        if (score > best.score) {
          secondScore = best.score;
          best = { idx, score, nameScore };
        } else if (score > secondScore) {
          secondScore = score;
        }
      });
      const threshold = best.nameScore >= 76 ? 76 : 60;
      if (best.idx < 0 || best.score < threshold) return { idx: -1, score: best.score };
      if (best.score < 90 && secondScore > 0 && best.score - secondScore < 4) return { idx: -1, score: best.score };
      return best;
    }

    function _findScheduleItemIndexSmart(list, command) {
      return _findScheduleItemMatchSmart(list, command).idx;
    }

    function _scheduleMissingDetailsReply(kind) {

    }

    async function _applyScheduleCommand(command, session) {
      const cmd = _normalizeScheduleCommand(command);
      if (!cmd.handled) return false;
      let kind = cmd.target || (cmd.action === "add" ? "activity" : "");
      const explicitKind = _detectScheduleTarget(cmd.rawText || "");
      if (explicitKind) kind = explicitKind;
      const action = cmd.action || "open";
      const item = cmd.item || {};
      _openScheduleBoard();

      if (action === "open" || action === "none") {
        _appendScheduleAssistantReply(_scheduleMissingDetailsReply(kind || "activity"), session);
        return true;
      }

      if (item.day && !SCHEDULE_DAY_KEYS.includes(item.day)) {
        const reply = isEnglishUi()
          ? "Personal Schedule currently supports Monday to Friday only."
          : "дёӘдәәж—ҘзЁӢзӣ®еүҚеҸӘж”ҜжҢҒе‘ЁдёҖеҲ°е‘Ёдә”гҖӮ";
        _appendScheduleAssistantReply(reply, session);
        return true;
      }

      if (!kind && action === "add") kind = "activity";
      let list = kind === "course" ? scheduleCourseItems : scheduleActivityItems;
      let save = kind === "course" ? _saveScheduleCourseItems : _saveScheduleActivityItems;
      let sort = kind === "course" ? _sortScheduleCourseItems : _sortScheduleActivityItems;
      let label = isEnglishUi() ? (kind === "course" ? "class" : "activity") : kind === "course" ? "иҜҫзЁӢ" : "жҙ»еҠЁ";

      if (action === "add") {
        const name = String(item.name || "").trim();
        if (!item.day || !item.start || !item.end || !name) {
          _appendScheduleAssistantReply(_scheduleMissingDetailsReply(kind), session);
          return true;
        }
        if (!_isWithinScheduleRange(item.start, item.end, SCHEDULE_RANGE_START_MIN, SCHEDULE_RANGE_END_MIN)) {
          const reply = isEnglishUi()
            ? "Time must be within 09:00-19:00 and end time must be later than start time."
            : "ж—¶й—ҙйңҖеңЁ 09:00-19:00 д№Ӣй—ҙпјҢдё”з»“жқҹж—¶й—ҙиҰҒжҷҡдәҺејҖе§Ӣж—¶й—ҙгҖӮ";
          _appendScheduleAssistantReply(reply, session);
          return true;
        }
        if (kind === "course") {
          const next = {
            day: item.day,
            name: name.slice(0, 60),
            location: String(item.location || "").trim().slice(0, 60),
            teacher: String(item.teacher || "").trim().slice(0, 60),
            start: item.start,
            end: item.end,
          };
          _setScheduleMotion("enter", kind, next);
          scheduleCourseItems = sort([...(scheduleCourseItems || []), next]);
          save();
          _setScheduleFocus(kind, next);
        } else {
          const next = {
            day: item.day,
            name: name.slice(0, 60),
            intro: String(item.intro || (isEnglishUi() ? "Added from chat command." : "йҖҡиҝҮеҜ№иҜқжҢҮд»Өж–°еўһгҖӮ")).trim().slice(0, 120),
            time: `${item.start}-${item.end}`,
          };
          scheduleActivityItems = sort([...(scheduleActivityItems || []), next]);
          save();
          _setScheduleFocus(kind, next);
        }
        renderRightModule();
        _clearScheduleMotionSoon();
        const weekday = _eventWeekdayLabel(item.day, _scheduleLang());
        const reply = isEnglishUi()
          ? `Added ${label}: ${name} on ${weekday} ${item.start}-${item.end}.`
          : `е·Іж·»еҠ ${label}пјҡ${name}пјҲ${weekday} ${item.start}-${item.end}пјүгҖӮ`;
        _appendScheduleAssistantReply(reply, session);
        return true;
      }

      let idx = _findScheduleItemIndexSmart(list, cmd);
      if (idx < 0 && action !== "add" && !explicitKind) {
        const altKind = kind === "course" ? "activity" : "course";
        const altList = altKind === "course" ? scheduleCourseItems : scheduleActivityItems;
        const altIdx = _findScheduleItemIndexSmart(altList, cmd);
        if (altIdx >= 0) {
          kind = altKind;
          list = altList;
          save = kind === "course" ? _saveScheduleCourseItems : _saveScheduleActivityItems;
          sort = kind === "course" ? _sortScheduleCourseItems : _sortScheduleActivityItems;
          label = isEnglishUi() ? (kind === "course" ? "class" : "activity") : kind === "course" ? "иҜҫзЁӢ" : "жҙ»еҠЁ";
          idx = altIdx;
        }
      }
      if (idx < 0) {
        const reply = isEnglishUi()
          ? `I opened Personal Schedule, but could not find the ${label} to ${action === "delete" ? "delete" : "update"}. Please include the exact name shown on the card.`
          : `е·Іжү“ејҖдёӘдәәж—ҘзЁӢпјҢдҪҶжІЎжңүжүҫеҲ°иҰҒ${action === "delete" ? "еҲ йҷӨ" : "дҝ®ж”№"}зҡ„${label}гҖӮиҜ·е°ҪйҮҸеҶҷеҮәеҚЎзүҮдёҠзҡ„е®Ңж•ҙеҗҚз§°гҖӮ`;
        _appendScheduleAssistantReply(reply, session);
        return true;
      }

      if (action === "delete") {
        const old = list[idx];
        await _animateScheduleRemoval(kind, old);
        if (kind === "course") {
          scheduleCourseItems = scheduleCourseItems.filter((_, i) => i !== idx);
          save();
        } else {
          scheduleActivityItems = scheduleActivityItems.filter((_, i) => i !== idx);
          save();
        }
        lastScheduleFocus = null;
        renderRightModule();
        const reply = isEnglishUi() ? `Deleted ${label}: ${old.name}.` : `е·ІеҲ йҷӨ${label}пјҡ${old.name}гҖӮ`;
        _appendScheduleAssistantReply(reply, session);
        return true;
      }

      const old = list[idx];
      const nextDay = item.day || old.day;
      const nextStart = item.start || old.start || String(old.time || "").split("-")[0];
      const nextEnd = item.end || old.end || String(old.time || "").split("-")[1];
      if (!_isWithinScheduleRange(nextStart, nextEnd, SCHEDULE_RANGE_START_MIN, SCHEDULE_RANGE_END_MIN)) {
        const reply = isEnglishUi()
          ? "Time must be within 09:00-19:00 and end time must be later than start time."
          : "ж—¶й—ҙйңҖеңЁ 09:00-19:00 д№Ӣй—ҙпјҢдё”з»“жқҹж—¶й—ҙиҰҒжҷҡдәҺејҖе§Ӣж—¶й—ҙгҖӮ";
        _appendScheduleAssistantReply(reply, session);
        return true;
      }
      if (kind === "course") {
        const next = {
          ...old,
          day: nextDay,
          start: nextStart,
          end: nextEnd,
          location: String(item.location || old.location || "").trim(),
          teacher: String(item.teacher || old.teacher || "").trim(),
        };
        scheduleCourseItems = sort(scheduleCourseItems.map((x, i) => (i === idx ? next : x)));
        save();
        _setScheduleFocus(kind, next);
      } else {
        const next = {
          ...old,
          day: nextDay,
          time: `${nextStart}-${nextEnd}`,
          intro: String(item.intro || old.intro || "").trim(),
        };
        scheduleActivityItems = sort(scheduleActivityItems.map((x, i) => (i === idx ? next : x)));
        save();
        _setScheduleFocus(kind, next);
      }
      renderRightModule();
      const weekday = _eventWeekdayLabel(nextDay, _scheduleLang());
      const reply = isEnglishUi()
        ? `Updated ${label}: ${old.name} is now on ${weekday} ${nextStart}-${nextEnd}.`
        : `е·Ідҝ®ж”№${label}пјҡ${old.name} зҺ°еңЁжҳҜ ${weekday} ${nextStart}-${nextEnd}гҖӮ`;
      _appendScheduleAssistantReply(reply, session);
      return true;
    }

    async function tryHandleScheduleCommand(inputText, session) {
      const text = String(inputText || "").trim();
      if (!text) return false;
      const pseudoContext = typeof getRecentPseudoContext === "function" ? getRecentPseudoContext(session, text) : [];
      const focus = _getRecentScheduleFocus(session);
      const hasScheduleIntent = _hasPersonalScheduleIntent(text) || _isScheduleEllipsisIntent(text, focus);
      const localCommand = _parseScheduleCommandLocal(text, focus);
      const explicitTarget = _detectScheduleTarget(text);
      let command = localCommand;
      if (hasScheduleIntent) {
        const modelCommand = await _parseScheduleCommandByModel(text, pseudoContext);
        if (modelCommand && modelCommand.handled && modelCommand.confidence >= 0.55) {
          const localHasFocusedTarget = !!(localCommand && localCommand.confidence >= 0.85 && (localCommand.matchName || (localCommand.item && localCommand.item.name)));
          command = {
            ...(localCommand || {}),
            ...modelCommand,
            action: modelCommand.action || (localCommand && localCommand.action) || "open",
            target: explicitTarget || (localHasFocusedTarget && !modelCommand.matchName ? localCommand.target : modelCommand.target || (localCommand && localCommand.target) || "activity"),
            item: { ...((localCommand && localCommand.item) || {}), ...(modelCommand.item || {}) },
            matchName: modelCommand.matchName || (localCommand && localCommand.matchName) || "",
            rawText: text,
          };
        }
      }
      if (!command || !command.handled) return false;
      return _applyScheduleCommand(command, session);
    }

    function _toMinutes(hm) {
      const m = String(hm || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!m) return 0;
      return Number(m[1]) * 60 + Number(m[2]);
    }

    function _eventWeekdayLabel(day, langObj) {
      return (langObj.days && langObj.days[day]) || day;
    }

    function _isWithinScheduleRange(startHm, endHm, rangeStartMin, rangeEndMin) {
      const s = _toMinutes(startHm);
      const e = _toMinutes(endHm);
      if (!s || !e) return false;
      if (e <= s) return false;
      return s >= rangeStartMin && e <= rangeEndMin;
    }

    function renderPersonalSchedulePage() {

      const timeLabels = [];
      for (let m = startMin; m <= endMin; m += 60) {
        const hh = String(Math.floor(m / 60)).padStart(2, "0");

    function _escapeHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function _linkifyRawUrlsInPlainText(text) {
      const s = String(text || "");
      // дёҚдҪҝз”Ё \bпјҢйҒҝе…ҚеңЁе…Ёи§’жӢ¬еҸ·/дёӯж–Үж ҮзӮ№еүҚеҗҺеҮәзҺ°жјҸеҢ№й…Қ
      const re = /https?:\/\/[^\s<>"']+/gi;
      let out = "";
      let last = 0;
      let m = null;
      while ((m = re.exec(s))) {
        let url = String(m[0] || "");
        // Strip trailing punctuation/brackets commonly produced by prose/markdown.
        // Example: "...пјҲhttps://a.b/cпјү" -> "...пјҲhttps://a.b/cпјү" (жӢ¬еҸ·дҝқз•ҷеңЁеӨ–еұӮпјҢURL жң¬дҪ“еҸҜзӮ№)
        url = url.replace(/[)\]}>гҖӢгҖ‘пјүгҖҸгҖҚ,пјҢгҖӮпјӣ;:пјҡ!?пјҒпјҹ]+$/g, "");
        out += _escapeHtml(s.slice(last, m.index));
        const safeHref = url.replace(/[\u0000-\u001F\u007F]/g, "");
        out += `<a href="${_escapeHtml(safeHref)}" target="_blank" rel="noopener noreferrer">${_escapeHtml(url)}</a>`;
        // Advance by the *original* matched length (not trimmed length),
        // so we don't accidentally re-render a trailing char.
        last = m.index + String(m[0] || "").length;
      }
      out += _escapeHtml(s.slice(last));
      return out;
    }

    function _escapeAndLinkify(text) {
      const s = String(text || "");
      // Support markdown-style links too: [text](https://...)
      const mdRe = /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/gi;
      let out = "";
      let last = 0;
      let m = null;
      while ((m = mdRe.exec(s))) {
        const label = String(m[1] || "").trim() || String(m[2] || "");
        const url = String(m[2] || "").trim();
        out += _linkifyRawUrlsInPlainText(s.slice(last, m.index));
        const safeHref = url.replace(/[\u0000-\u001F\u007F]/g, "");
        out += `<a href="${_escapeHtml(safeHref)}" target="_blank" rel="noopener noreferrer">${_escapeHtml(label)}</a>`;
        last = m.index + String(m[0] || "").length;
      }
      out += _linkifyRawUrlsInPlainText(s.slice(last));
      return out;
    }
