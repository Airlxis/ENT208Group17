<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 西浦生活助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f9fafb);
      color: #111827;
      padding: 16px;
    }
    .panel {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 18px 55px -35px rgba(15, 23, 42, 0.35);
      padding: 22px 18px 16px;
    }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 16px; }
    .form-item { margin-bottom: 12px; }
    .label { display: block; font-size: 12px; color: #475569; margin-bottom: 6px; }
    input {
      width: 100%;
      height: 40px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.2); }
    .avatar-row { display: flex; align-items: center; gap: 10px; margin: 8px 0 14px; }
    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid #d1d5db; background: #fff;
    }
    .hint { font-size: 12px; color: #64748b; }
    .actions { display: flex; gap: 8px; margin-top: 8px; }
    button {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #f1f5f9; color: #0f172a; border: 1px solid #e2e8f0; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary:hover { background: #eef2ff; border-color: #c7d2fe; }
    .error { font-size: 12px; color: #dc2626; min-height: 18px; margin-top: 6px; }

    .tabs {
      display: flex;
      gap: 10px;
      margin: 6px 0 14px;
    }

    .tab-btn {
      flex: 1;
      height: 36px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: #f1f5f9;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
    }
    .tab-btn:hover { background: #eef2ff; border-color: #c7d2fe; }

    .tab-btn.active {
      background: #2563eb;
      color: #ffffff;
      border-color: #2563eb;
    }

    .tab-panel {
      margin-top: 6px;
    }

    .bottom-hint {
      margin-top: 6px;
      min-height: 18px;
      font-size: 12px;
      color: #2563eb;
    }

    .small-link {
      color: #2563eb;
      cursor: pointer;
      text-decoration: none;
    }

    .small-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="title" id="pageTitle">登录</div>
    <div class="subtitle">登录后将在侧边栏显示你的账号和头像</div>

    <div class="tabs">
      <button class="tab-btn active" id="tabLoginBtn" type="button">登录</button>
      <button class="tab-btn" id="tabRegisterBtn" type="button">注册</button>
    </div>

    <div id="loginPanel" class="tab-panel">
      <div class="form-item">
        <label class="label" for="loginUsername">账号</label>
        <input id="loginUsername" placeholder="例如：han_xjtlu" />
      </div>

      <div class="form-item">
        <label class="label" for="loginPassword">密码</label>
        <input id="loginPassword" type="password" placeholder="请输入密码" />
      </div>

      <div class="actions">
        <button class="btn-secondary" id="cancelBtn" type="button">取消</button>
        <button class="btn-primary" id="loginBtn" type="button">登录</button>
      </div>

      <div class="bottom-hint" id="loginBottomHint"></div>
      <div class="error" id="errorText"></div>
    </div>

    <div id="registerPanel" class="tab-panel" style="display:none;">
      <div class="form-item">
        <label class="label" for="registerUsername">账号</label>
        <input id="registerUsername" placeholder="例如：han_xjtlu" />
      </div>

      <div class="form-item">
        <label class="label" for="registerPassword">密码</label>
        <input id="registerPassword" type="password" placeholder="请输入密码" />
      </div>

      <div class="actions">
        <button class="btn-secondary" type="button" id="cancelBtn2">取消</button>
        <button class="btn-primary" id="registerBtn" type="button">注册</button>
      </div>

      <div class="bottom-hint" id="registerBottomHint"></div>
      <div class="error" id="registerErrorText"></div>
    </div>
  </div>

  <script>
    const LOGIN_STORAGE_KEY = "xipu_life_assistant_user";
    const USER_DB_KEY = "xipu_life_assistant_users";

    const pageTitleEl = document.getElementById("pageTitle");
    const tabLoginBtnEl = document.getElementById("tabLoginBtn");
    const tabRegisterBtnEl = document.getElementById("tabRegisterBtn");
    const loginPanelEl = document.getElementById("loginPanel");
    const registerPanelEl = document.getElementById("registerPanel");
    const loginUsernameEl = document.getElementById("loginUsername");
    const loginPasswordEl = document.getElementById("loginPassword");
    const registerUsernameEl = document.getElementById("registerUsername");
    const registerPasswordEl = document.getElementById("registerPassword");
    const loginBtnEl = document.getElementById("loginBtn");
    const registerBtnEl = document.getElementById("registerBtn");
    const cancelBtnEl = document.getElementById("cancelBtn");
    const cancelBtn2El = document.getElementById("cancelBtn2");
    const errorTextEl = document.getElementById("errorText");
    const registerErrorTextEl = document.getElementById("registerErrorText");
    const loginBottomHintEl = document.getElementById("loginBottomHint");
    const registerBottomHintEl = document.getElementById("registerBottomHint");

    const params = new URLSearchParams(window.location.search);
    const redirectTo = params.get("redirect") || "/";

    function fallbackAvatar(name) {
      const seed = encodeURIComponent(name || "Guest");
      return `https://api.dicebear.com/7.x/initials/svg?seed=${seed}`;
    }

    cancelBtnEl.addEventListener("click", () => {
      window.location.href = redirectTo;
    });

    if (cancelBtn2El) {
      cancelBtn2El.addEventListener("click", () => {
        window.location.href = redirectTo;
      });
    }

    function loadUsers() {
      try {
        const raw = localStorage.getItem(USER_DB_KEY);
        if (!raw) return {};
        const data = JSON.parse(raw);
        if (!data || typeof data !== "object") return {};
        return data;
      } catch (e) {
        return {};
      }
    }

    function saveUsers(users) {
      localStorage.setItem(USER_DB_KEY, JSON.stringify(users));
    }

    function clearLoginMessages() {
      errorTextEl.textContent = "";
      loginBottomHintEl.textContent = "";
    }

    function clearRegisterMessages() {
      registerErrorTextEl.textContent = "";
      registerBottomHintEl.textContent = "";
    }

    function showLoginTab() {
      pageTitleEl.textContent = "登录";
      tabLoginBtnEl.classList.add("active");
      tabRegisterBtnEl.classList.remove("active");
      loginPanelEl.style.display = "block";
      registerPanelEl.style.display = "none";
      clearLoginMessages();
      loginUsernameEl.focus();
    }

    function showRegisterTab() {
      pageTitleEl.textContent = "注册";
      tabRegisterBtnEl.classList.add("active");
      tabLoginBtnEl.classList.remove("active");
      registerPanelEl.style.display = "block";
      loginPanelEl.style.display = "none";
      clearRegisterMessages();
      registerUsernameEl.focus();
    }

    tabLoginBtnEl.addEventListener("click", showLoginTab);
    tabRegisterBtnEl.addEventListener("click", showRegisterTab);

    loginBtnEl.addEventListener("click", () => {
      clearLoginMessages();
      const username = loginUsernameEl.value.trim();
      const password = loginPasswordEl.value;

      if (!username) {
        errorTextEl.textContent = "请输入账号";
        loginUsernameEl.focus();
        return;
      }
      if (!password) {
        errorTextEl.textContent = "请输入密码";
        loginPasswordEl.focus();
        return;
      }

      const users = loadUsers();
      if (!users[username]) {
        loginBottomHintEl.innerHTML = `未注册？<a href="#" id="toRegisterFromLogin" class="small-link">先注册</a>`;
        const link = document.getElementById("toRegisterFromLogin");
        if (link) {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            registerUsernameEl.value = username;
            showRegisterTab();
          });
        }
        return;
      }

      if (users[username] !== password) {
        errorTextEl.textContent = "密码错误";
        return;
      }

      const user = {
        username,
        avatar: fallbackAvatar(username),
      };
      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify(user));
      window.location.href = redirectTo;
    });

    registerBtnEl.addEventListener("click", () => {
      clearRegisterMessages();
      const username = registerUsernameEl.value.trim();
      const password = registerPasswordEl.value;

      if (!username) {
        registerErrorTextEl.textContent = "请输入账号";
        registerUsernameEl.focus();
        return;
      }
      if (!password) {
        registerErrorTextEl.textContent = "请输入密码";
        registerPasswordEl.focus();
        return;
      }

      const users = loadUsers();
      if (users[username]) {
        registerBottomHintEl.innerHTML = `已有账户？<a href="#" id="toLoginFromRegister" class="small-link">去登录</a>`;
        const link = document.getElementById("toLoginFromRegister");
        if (link) {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            loginUsernameEl.value = username;
            showLoginTab();
          });
        }
        return;
      }

      users[username] = password;
      saveUsers(users);

      // 注册成功后，引导去登录
      registerBottomHintEl.innerHTML = `注册成功！<a href="#" id="toLoginAfterRegister" class="small-link">去登录</a>`;
      const link = document.getElementById("toLoginAfterRegister");
      if (link) {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          loginUsernameEl.value = username;
          showLoginTab();
        });
      }
    });
  </script>
</body>
</html>
